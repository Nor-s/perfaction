name: Ubuntu LottieExpressions Compare
run-name: Compare (main vs ${{ inputs.branch }}) (tick=${{ inputs.tick_count }})

on:
  workflow_dispatch:
    inputs:
      branch:
        description: ThorVG branch to merge into main locally
        required: true
        type: string
      tick_count:
        description: Tick count for LottieExpressions exit
        required: true
        default: '4000'
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ubuntu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Packages
        shell: bash
        run: |
          packages=(meson ninja-build libsdl2-dev libgl1-mesa-dev)
          missing=()
          for pkg in "${packages[@]}"; do
            if ! dpkg-query -W -f='${Status}' "$pkg" 2>/dev/null | grep -q "install ok installed"; then
              missing+=("$pkg")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            sudo apt-get update
            sudo apt-get install -y "${missing[@]}"
          else
            echo "Ubuntu packages already installed."
          fi

      - name: Prepare report directory
        shell: bash
        run: |
          mkdir -p ci-report

      - name: Collect LottieExpressions Performance
        shell: bash
        run: |
          repo_root="$PWD"
          target_branch="${{ github.event.inputs.branch }}"
          subproject_dir="subprojects/thorvg-main"

          collect_perf() {
            state="$1"
            build_dir="build-${state}"
            raw_log="${repo_root}/ci-report/raw_ubuntu_${state}_sw_0.tmp"
            final_log="${repo_root}/ci-report/ubuntu_${state}_sw_0.log"
            metrics_file="${repo_root}/ci-report/ubuntu_${state}_metrics.txt"

            meson setup --wipe "$build_dir" \
              -Dbuildtype=release \
              -Doptimization=s \
              -Dthorvg_subproject=thorvg-main \
              -Dthreads=true
            meson compile -C "$build_dir"
            /usr/bin/time -v -o "$metrics_file" "./${build_dir}/src/LottieExpressions" sw 0 "${{ inputs.tick_count }}" > "$raw_log" 2>&1
            status=$?
            tail -n 30 "$raw_log" > "$final_log"
            python3 -c "import re, sys, pathlib; state=sys.argv[1]; metrics_path=pathlib.Path(sys.argv[2]); out_path=pathlib.Path(sys.argv[3]); text=metrics_path.read_text(encoding='utf-8', errors='replace'); patterns={'rss_kb': r'Maximum resident set size \\(kbytes\\):\\s*(\\d+)', 'user_sec': r'User time \\(seconds\\):\\s*([0-9.]+)', 'sys_sec': r'System time \\(seconds\\):\\s*([0-9.]+)', 'elapsed': r'Elapsed \\(wall clock\\) time \\(h:mm:ss or m:ss\\):\\s*([0-9:.]+)', 'vol_cs': r'Voluntary context switches:\\s*(\\d+)', 'invol_cs': r'Involuntary context switches:\\s*(\\d+)'}; extract=lambda key: (re.search(patterns[key], text).group(1) if re.search(patterns[key], text) else ''); elapsed_raw=extract('elapsed'); elapsed=''; parts=elapsed_raw.split(':') if elapsed_raw else []; elapsed=(f'{sum(float(part) * factor for part, factor in zip(parts, [3600, 60, 1][-len(parts):])):.3f}s' if parts else ''); values=[state, extract('rss_kb'), extract('user_sec'), extract('sys_sec'), elapsed, extract('vol_cs'), extract('invol_cs')]; out_path.open('a', encoding='utf-8').write('\\t'.join(values)+'\\n')" "$state" "$metrics_file" "${repo_root}/ci-report/runtime_metrics.tsv"
            python3 -c "import re, sys, pathlib; state=sys.argv[1]; metrics_path=pathlib.Path(sys.argv[2]); out_path=pathlib.Path(sys.argv[3]); text=metrics_path.read_text(encoding='utf-8', errors='replace'); m=re.search(r'Elapsed \\(wall clock\\) time \\(h:mm:ss or m:ss\\):\\s*([0-9:.]+)', text); elapsed='n/a'; raw=m.group(1) if m else ''; parts=raw.split(':') if raw else []; elapsed=(f'{sum(float(part) * factor for part, factor in zip(parts, [3600, 60, 1][-len(parts):])):.3f}s' if parts else 'n/a'); out_path.open('a', encoding='utf-8').write(f'{state}\\t{elapsed}\\n')" "$state" "$metrics_file" "${repo_root}/ci-report/elapsed_metrics.tsv"
            return $status
          }

          printf 'branch\t%s\n' "$target_branch" > "${repo_root}/ci-report/merge_status.tsv"
          : > "${repo_root}/ci-report/runtime_metrics.tsv"
          : > "${repo_root}/ci-report/elapsed_metrics.tsv"

          pushd "$subproject_dir" > /dev/null
          git fetch origin "refs/heads/main"
          main_commit="$(git rev-parse FETCH_HEAD^{commit})"
          git fetch origin "refs/heads/${target_branch}"
          feature_commit="$(git rev-parse FETCH_HEAD^{commit})"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout --detach "${main_commit}"
          popd > /dev/null
          collect_perf base

          pushd "$subproject_dir" > /dev/null
          git switch -C ci-rebase-check "${feature_commit}"
          if ! git rebase "${main_commit}"; then
            printf 'status\trebase-conflict\n' >> "${repo_root}/ci-report/merge_status.tsv"
            git rebase --abort || true
            popd > /dev/null
            exit 1
          fi
          printf 'status\trebased\n' >> "${repo_root}/ci-report/merge_status.tsv"
          git log --oneline --no-merges "${main_commit}..HEAD" > "${repo_root}/ci-report/feature_commits.txt" || true
          popd > /dev/null

          collect_perf merged

      - name: Upload Performance Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ubuntu-lottie-expressions-compare
          path: |
            ci-report/*.log
            ci-report/*.tsv
            ci-report/*.txt
          if-no-files-found: warn

  report:
    name: Ubuntu LottieExpressions Report
    if: ${{ always() }}
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download Performance Artifacts
        uses: actions/download-artifact@v8
        with:
          path: all-report
          pattern: ubuntu-lottie-expressions-compare
          merge-multiple: true

      - name: Write Performance Summary
        shell: bash
        env:
          BRANCH_NAME: ${{ github.event.inputs.branch }}
          TICK_COUNT: ${{ github.event.inputs.tick_count }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          branch_name = os.environ["BRANCH_NAME"]
          merge_status_path = Path("all-report/merge_status.tsv")
          commits_path = Path("all-report/feature_commits.txt")
          log_paths = sorted(Path("all-report").glob("*.log"))
          elapsed_metrics_path = Path("all-report/elapsed_metrics.tsv")

          merge_status = {"branch": branch_name, "status": "unknown"}
          if merge_status_path.exists():
              for line in merge_status_path.read_text(encoding="utf-8", errors="replace").splitlines():
                  if not line.strip():
                      continue
                  key, value = line.split("\t", 1)
                  merge_status[key] = value

          lines = [
              f"## LottieExpressions (main vs {branch_name}) (tickCnt={os.environ['TICK_COUNT']})",
              "",
              f"- Branch: `{merge_status.get('branch', branch_name)}`",
              "",
          ]

          commit_lines = []
          if commits_path.exists():
              commit_lines = [line for line in commits_path.read_text(encoding="utf-8", errors="replace").splitlines() if line.strip()]

          lines.append("### Added Commits")
          lines.append("")
          if commit_lines:
              lines.append("```text")
              lines.extend(commit_lines)
              lines.append("```")
          else:
              lines.append("No additional commits.")
          lines.append("")

          if merge_status.get("status") != "rebased":
              lines.append("Rebase conflict occurred. Performance comparison was not completed.")
              summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
              raise SystemExit(0)

          if not log_paths:
              lines.append("No performance logs were collected.")
              summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
              raise SystemExit(0)

          fps_pattern = re.compile(r"\[\s*\d+\]:\s*([0-9.]+)\s*/\s*([0-9.]+)\s+fps")
          fps_by_state = {}
          elapsed_by_state = {}

          for log_path in log_paths:
              name = log_path.name.removesuffix(".log")
              parts = name.split("_")
              if len(parts) != 4:
                  continue
              _, state, _, _ = parts
              avg_fps = None
              for line in reversed(log_path.read_text(encoding="utf-8", errors="replace").splitlines()):
                  match = fps_pattern.search(line)
                  if match:
                      avg_fps = float(match.group(2))
                      break
              if avg_fps is not None:
                  fps_by_state[state] = avg_fps

          if elapsed_metrics_path.exists():
              for line in elapsed_metrics_path.read_text(encoding="utf-8", errors="replace").splitlines():
                  if not line.strip():
                      continue
                  state, elapsed = line.split("\t", 1)
                  elapsed_by_state[state] = elapsed or "n/a"

          lines.extend([
              "| Comparison | FPS Delta | Base Elapsed | Target Elapsed |",
              "|---|---:|---:|---:|",
          ])

          base = fps_by_state.get("base")
          target = fps_by_state.get("merged")
          if base is None or target is None:
              lines.append(f"| main vs main+{branch_name} | n/a | {elapsed_by_state.get('base', 'n/a')} | {elapsed_by_state.get('merged', 'n/a')} |")
          else:
              pct = ((target / base) - 1.0) * 100.0
              pct_sign = "+" if pct > 0 else ""
              lines.append(f"| main vs main+{branch_name} | {pct_sign}{pct:.2f}% | {elapsed_by_state.get('base', 'n/a')} | {elapsed_by_state.get('merged', 'n/a')} |")

          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
