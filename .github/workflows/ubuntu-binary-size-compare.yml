name: Ubuntu Binary Size Compare
run-name: Size Compare (main vs ${{ inputs.branch }})

on:
  workflow_dispatch:
    inputs:
      branch:
        description: ThorVG branch to merge into main locally
        required: true
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: ubuntu x86_64 gcc
            key: ubuntu-x86_64-gcc
            runs_on: ubuntu-24.04
            compiler: gcc
            target_arch: x86_64
            extra_packages: ''
            cc: gcc
            cxx: g++
            c_args: ''
            cpp_args: ''
            c_link_args: ''
            cpp_link_args: ''
          - label: ubuntu x86_64 clang
            key: ubuntu-x86_64-clang
            runs_on: ubuntu-24.04
            compiler: clang
            target_arch: x86_64
            extra_packages: 'clang lld libomp-dev'
            cc: clang
            cxx: clang++
            c_args: ''
            cpp_args: ''
            c_link_args: ''
            cpp_link_args: ''
          - label: ubuntu x86 gcc
            key: ubuntu-x86-gcc
            runs_on: ubuntu-24.04
            compiler: gcc
            target_arch: x86
            extra_packages: 'gcc-multilib g++-multilib'
            cc: gcc
            cxx: g++
            c_args: -m32
            cpp_args: -m32
            c_link_args: -m32
            cpp_link_args: -m32
          - label: ubuntu arm64 gcc
            key: ubuntu-arm64-gcc
            runs_on: ubuntu-24.04-arm
            compiler: gcc
            target_arch: arm64
            extra_packages: ''
            cc: gcc
            cxx: g++
            c_args: ''
            cpp_args: ''
            c_link_args: ''
            cpp_link_args: ''
          - label: ubuntu arm64 clang
            key: ubuntu-arm64-clang
            runs_on: ubuntu-24.04-arm
            compiler: clang
            target_arch: arm64
            extra_packages: 'clang lld libomp-dev'
            cc: clang
            cxx: clang++
            c_args: ''
            cpp_args: ''
            c_link_args: ''
            cpp_link_args: ''

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Packages
        shell: bash
        env:
          EXTRA_PACKAGES: ${{ matrix.extra_packages }}
        run: |
          packages=(meson ninja-build libgl1-mesa-dev)
          if [ -n "$EXTRA_PACKAGES" ]; then
            for pkg in $EXTRA_PACKAGES; do
              packages+=("$pkg")
            done
          fi

          missing=()
          for pkg in "${packages[@]}"; do
            if ! dpkg-query -W -f='${Status}' "$pkg" 2>/dev/null | grep -q "install ok installed"; then
              missing+=("$pkg")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            sudo apt-get update
            sudo apt-get install -y "${missing[@]}"
          else
            echo "Ubuntu packages already installed."
          fi

      - name: Prepare report directory
        shell: bash
        run: |
          mkdir -p ci-report

      - name: Collect Binary Size Metrics
        shell: bash
        env:
          TARGET_BRANCH: ${{ inputs.branch }}
          MATRIX_KEY: ${{ matrix.key }}
          COMPILER: ${{ matrix.compiler }}
          TARGET_ARCH: ${{ matrix.target_arch }}
          CC_NAME: ${{ matrix.cc }}
          CXX_NAME: ${{ matrix.cxx }}
          C_ARGS_VALUE: ${{ matrix.c_args }}
          CPP_ARGS_VALUE: ${{ matrix.cpp_args }}
          C_LINK_ARGS_VALUE: ${{ matrix.c_link_args }}
          CPP_LINK_ARGS_VALUE: ${{ matrix.cpp_link_args }}
        run: |
          repo_root="$PWD"
          subproject_dir="subprojects/thorvg-main"

          meson_args=(
            -Dbuildtype=release
            -Doptimization=s
            -Dengines=sw
            -Dloaders=all
            -Dsavers=all
            -Dbindings=capi
            -Dextra=lottie_exp,openmp
            -Db_sanitize=none
            -Dthreads=true
            -Ddefault_library=shared
          )

          if [ -n "$C_ARGS_VALUE" ]; then
            meson_args+=("-Dc_args=${C_ARGS_VALUE}")
          fi
          if [ -n "$CPP_ARGS_VALUE" ]; then
            meson_args+=("-Dcpp_args=${CPP_ARGS_VALUE}")
          fi
          if [ -n "$C_LINK_ARGS_VALUE" ]; then
            meson_args+=("-Dc_link_args=${C_LINK_ARGS_VALUE}")
          fi
          if [ -n "$CPP_LINK_ARGS_VALUE" ]; then
            meson_args+=("-Dcpp_link_args=${CPP_LINK_ARGS_VALUE}")
          fi

          collect_size() {
            state="$1"
            build_dir="build-${state}"
            size_out="${repo_root}/ci-report/${MATRIX_KEY}_${state}.size.txt"

            CC="$CC_NAME" CXX="$CXX_NAME" meson setup --wipe "$build_dir" "${meson_args[@]}"
            CC="$CC_NAME" CXX="$CXX_NAME" meson compile -C "$build_dir"

            lib_path="$build_dir/src/libthorvg-1.so.1.0.0"
            if [ ! -f "$lib_path" ]; then
              echo "Failed to locate shared lib: $lib_path" >&2
              exit 1
            fi

            strip "$lib_path"
            size "$lib_path" > "$size_out"
            read -r text_size data_size _ < <(awk 'NR==2 {print $1, $2, $3}' "$size_out")
            total_size=$((text_size + data_size))
            printf '%s\t%s\t%s\t%s\n' \
              "$state" \
              "$text_size" \
              "$data_size" \
              "$total_size" >> "${repo_root}/ci-report/${MATRIX_KEY}_binary_sizes.tsv"
          }

          : > "${repo_root}/ci-report/${MATRIX_KEY}_binary_sizes.tsv"
          {
            printf 'branch\t%s\n' "$TARGET_BRANCH"
            printf 'compiler\t%s\n' "$COMPILER"
            printf 'target_arch\t%s\n' "$TARGET_ARCH"
            printf 'compiler_path\t%s\n' "$(command -v "$CXX_NAME")"
            printf 'compiler_version\t%s\n' "$("$CXX_NAME" --version | head -n 1)"
          } > "${repo_root}/ci-report/${MATRIX_KEY}_merge_status.tsv"
          : > "${repo_root}/ci-report/${MATRIX_KEY}_feature_commits.txt"

          merge_ok=true
          pushd "$subproject_dir" > /dev/null

          main_commit="$(git rev-parse HEAD^{commit})"
          if [ "$TARGET_BRANCH" = "main" ]; then
            feature_commit="$main_commit"
          else
            git fetch origin "refs/heads/${TARGET_BRANCH}"
            feature_commit="$(git rev-parse FETCH_HEAD^{commit})"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout --detach "${main_commit}"
          collect_size base

          if [ "$TARGET_BRANCH" = "main" ]; then
            collect_size merged
            printf 'status\tmerged\n' >> "${repo_root}/ci-report/${MATRIX_KEY}_merge_status.tsv"
          else
            git switch -C ci-merge-check "${main_commit}"
            if ! git -c advice.mergeConflict=false merge --no-commit --no-ff "${feature_commit}"; then
              printf 'status\tmerge-conflict\n' >> "${repo_root}/ci-report/${MATRIX_KEY}_merge_status.tsv"
              git diff --name-only --diff-filter=U > "${repo_root}/ci-report/${MATRIX_KEY}_conflicts.txt" || true
              git merge --abort || true
              merge_ok=false
            else
              git log --oneline --no-merges "${main_commit}..${feature_commit}" > "${repo_root}/ci-report/${MATRIX_KEY}_feature_commits.txt" || true
              collect_size merged
              printf 'status\tmerged\n' >> "${repo_root}/ci-report/${MATRIX_KEY}_merge_status.tsv"
            fi
          fi

          popd > /dev/null

      - name: Upload Binary Size Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ubuntu-binary-size-compare-${{ matrix.key }}
          path: |
            ci-report/${{ matrix.key }}*.size.txt
            ci-report/${{ matrix.key }}*.tsv
            ci-report/${{ matrix.key }}*.txt
          if-no-files-found: warn

  report:
    name: Ubuntu Binary Size Report
    if: ${{ always() }}
    needs: [build]
    runs-on: ubuntu-24.04
    steps:
      - name: Download Binary Size Artifacts
        uses: actions/download-artifact@v8
        with:
          path: all-size
          pattern: ubuntu-binary-size-compare-*
          merge-multiple: true

      - name: Write Binary Size Summary
        shell: bash
        env:
          BRANCH_NAME: ${{ inputs.branch }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          branch_name = os.environ["BRANCH_NAME"]
          root = Path("all-size")

          size_tsv_files = sorted(root.glob("*_binary_sizes.tsv"))
          status_files = sorted(root.glob("*_merge_status.tsv"))
          commit_files = sorted(root.glob("*_feature_commits.txt"))
          conflict_files = sorted(root.glob("*_conflicts.txt"))

          if not size_tsv_files and not status_files:
              summary_path.write_text(f"## Binary Size (main vs {branch_name})\n\nNo size artifacts were collected.\n", encoding="utf-8")
              raise SystemExit(0)

          def format_size_delta(base_total, target_total):
              diff = target_total - base_total
              pct = ((target_total / base_total) - 1.0) * 100.0 if base_total else 0.0
              pct_sign = "+" if pct > 0 else ""
              return f"{diff:+d} bytes ({pct_sign}{pct:.2f}%)"

          status_by_key = {}
          for status_file in status_files:
              key = status_file.name.removesuffix("_merge_status.tsv")
              status_map = {}
              for line in status_file.read_text(encoding="utf-8", errors="replace").splitlines():
                  if not line.strip():
                      continue
                  field, value = line.split("\t", 1)
                  status_map[field] = value
              status_by_key[key] = status_map

          size_by_key = {}
          for size_file in size_tsv_files:
              key = size_file.name.removesuffix("_binary_sizes.tsv")
              size_by_key[key] = {}
              for line in size_file.read_text(encoding="utf-8", errors="replace").splitlines():
                  if not line.strip():
                      continue
                  state, text_size, data_size, total_size = line.split("\t")
                  size_by_key[key][state] = {
                      "text": int(text_size),
                      "data": int(data_size),
                      "total": int(total_size),
                  }

          commit_lines = []
          for commit_file in commit_files:
              commit_lines = [line for line in commit_file.read_text(encoding="utf-8", errors="replace").splitlines() if line.strip()]
              if commit_lines:
                  break

          conflicts_by_key = {}
          for conflict_file in conflict_files:
              key = conflict_file.name.removesuffix("_conflicts.txt")
              conflicts_by_key[key] = [line for line in conflict_file.read_text(encoding="utf-8", errors="replace").splitlines() if line.strip()]

          lines = [
              f"## Binary Size (main vs {branch_name})",
              "",
              "- Shared object: `libthorvg-1.so.1.0.0`",
              "",
          ]

          lines.append("### Added Commits")
          lines.append("")
          if commit_lines:
              lines.append("```text")
              lines.extend(commit_lines)
              lines.append("```")
          else:
              lines.append("No additional commits.")
          lines.append("")

          incomplete_keys = []

          if any(conflicts_by_key.values()):
              lines.append("### Merge Conflicts")
              lines.append("")
              for key in sorted(conflicts_by_key):
                  entries = conflicts_by_key[key]
                  if not entries:
                      continue
                  status = status_by_key.get(key, {})
                  compiler = status.get("compiler", "n/a")
                  target_arch = status.get("target_arch", "n/a")
                  runner = "ubuntu-24.04-arm" if "arm64" in key else "ubuntu-24.04"
                  lines.append(f"- `{runner}` / `{compiler}` / `{target_arch}`")
                  for entry in entries:
                      lines.append(f"  - `{entry}`")
              lines.append("")

          lines.extend([
              "### Summary",
              "",
              "| Runner | Compiler | Target | Delta |",
              "|---|---|---|---:|",
          ])

          all_keys = sorted(set(status_by_key) | set(size_by_key))
          detail_rows = []
          for key in all_keys:
              status = status_by_key.get(key, {})
              compiler = status.get("compiler", "n/a")
              compiler_path = status.get("compiler_path", "n/a")
              compiler_version = status.get("compiler_version", "n/a")
              target_arch = status.get("target_arch", "n/a")
              run_status = status.get("status", "unknown")
              runner = "ubuntu-24.04-arm" if "arm64" in key else "ubuntu-24.04"

              base = size_by_key.get(key, {}).get("base")
              target = size_by_key.get(key, {}).get("merged")
              if run_status != "merged" or base is None or target is None:
                  incomplete_keys.append((key, runner, compiler, target_arch, run_status, base is not None, target is not None))
                  lines.append(
                      f"| {runner} | {compiler} | {target_arch} | n/a |"
                  )
                  continue

              delta = format_size_delta(base['total'], target['total'])
              lines.append(
                  f"| {runner} | {compiler} | {target_arch} | {delta} |"
              )
              detail_rows.append(
                  f"| {runner} | {compiler} | {target_arch} | "
                  f"{base['text']} | {base['data']} | {base['total']} | "
                  f"{target['text']} | {target['data']} | {target['total']} | "
                  f"{delta} |"
              )

          lines.append("")
          lines.extend([
              "### Detail",
              "",
              "| Runner | Compiler | Target | Base TEXT | Base DATA | Base TEXT+DATA | Target TEXT | Target DATA | Target TEXT+DATA | Delta |",
              "|---|---|---|---:|---:|---:|---:|---:|---:|---:|",
          ])
          if detail_rows:
              lines.extend(detail_rows)
          else:
              lines.append("| n/a | n/a | n/a | n/a | n/a | n/a | n/a | n/a | n/a | n/a |")

          lines.append("")
          lines.append("### Compiler Details")
          lines.append("")
          for key in all_keys:
              status = status_by_key.get(key, {})
              compiler = status.get("compiler", "n/a")
              compiler_path = status.get("compiler_path", "n/a")
              compiler_version = status.get("compiler_version", "n/a")
              target_arch = status.get("target_arch", "n/a")
              runner = "ubuntu-24.04-arm" if "arm64" in key else "ubuntu-24.04"
              lines.append(
                  f"- `{runner}` / `{target_arch}`: `{compiler}` from `{compiler_path}` "
                  f"({compiler_version})"
              )

          if incomplete_keys:
              lines.append("")
              lines.append("### Incomplete Collections")
              lines.append("")
              for _, runner, compiler, target_arch, run_status, has_base, has_target in incomplete_keys:
                  lines.append(
                      f"- `{runner}` / `{compiler}` / `{target_arch}`: "
                      f"status=`{run_status}`, base_size={'yes' if has_base else 'no'}, target_size={'yes' if has_target else 'no'}"
                  )

          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
