name: LottieExpressions Matrix

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  actions: read

jobs:
  build:
    name: ${{ matrix.platform }} / ${{ matrix.thorvg_subproject }} / threads=${{ matrix.threads }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - ubuntu
          - macos
          - windows-msvc
          - windows-msys2
        thorvg_subproject:
          - thorvg-main
          - thorvg-nors
        threads:
          - true
          - false
        include:
          - platform: ubuntu
            runs_on: ubuntu-latest
          - platform: macos
            runs_on: macos-latest
          - platform: windows-msvc
            runs_on: windows-latest
          - platform: windows-msys2
            runs_on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set Up Python
        if: matrix.platform == 'windows-msvc'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set Up MSVC Developer Command Prompt
        if: matrix.platform == 'windows-msvc'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set Up MSYS2
        if: matrix.platform == 'windows-msys2'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            git
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-meson
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-SDL2

      - name: Install Packages (Ubuntu)
        if: matrix.platform == 'ubuntu'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build libsdl2-dev libgl1-mesa-dev

      - name: Install Packages (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          brew update
          brew install meson ninja sdl2 libomp
          echo "PKG_CONFIG_PATH=$(brew --prefix)/lib/pkgconfig:$(brew --prefix sdl2)/lib/pkgconfig:$(brew --prefix libomp)/lib/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}" >> "$GITHUB_ENV"
          echo "CPPFLAGS=-I$(brew --prefix libomp)/include${CPPFLAGS:+ $CPPFLAGS}" >> "$GITHUB_ENV"
          echo "LDFLAGS=-L$(brew --prefix libomp)/lib -Wl,-rpath,$(brew --prefix libomp)/lib${LDFLAGS:+ $LDFLAGS}" >> "$GITHUB_ENV"

      - name: Install Packages (Windows MSVC)
        if: matrix.platform == 'windows-msvc'
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install meson ninja
          choco install pkgconfiglite -y
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP 'vcpkg'
          git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
          $env:VCPKG_ROOT = $vcpkgRoot
          & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            & "$vcpkgRoot\vcpkg.exe" --vcpkg-root "$vcpkgRoot" install sdl2:x64-windows
            if ($LASTEXITCODE -eq 0) {
              break
            }
            if ($attempt -eq $maxAttempts) {
              exit $LASTEXITCODE
            }
            Write-Host "vcpkg install failed on attempt $attempt/$maxAttempts. Retrying after backoff..."
            Start-Sleep -Seconds (15 * $attempt)
          }
          "PKG_CONFIG_PATH=$vcpkgRoot\installed\x64-windows\lib\pkgconfig;$vcpkgRoot\installed\x64-windows\share\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CMAKE_PREFIX_PATH=$vcpkgRoot\installed\x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$vcpkgRoot\installed\x64-windows\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure and Build (POSIX)
        if: matrix.platform == 'ubuntu' || matrix.platform == 'macos'
        shell: bash
        run: |
          meson setup build -Dthorvg_subproject=${{ matrix.thorvg_subproject }} -Dthreads=${{ matrix.threads }}
          meson compile -C build

      - name: Configure and Build (Windows MSVC)
        if: matrix.platform == 'windows-msvc'
        shell: powershell
        run: |
          meson setup build "-Dthorvg_subproject=${{ matrix.thorvg_subproject }}" "-Dthreads=${{ matrix.threads }}"
          meson compile -C build

      - name: Configure and Build (Windows MSYS2)
        if: matrix.platform == 'windows-msys2'
        shell: msys2 {0}
        run: |
          meson setup build -Dthorvg_subproject=${{ matrix.thorvg_subproject }} -Dthreads=${{ matrix.threads }}
          meson compile -C build

      - name: Prepare report directory (POSIX)
        if: matrix.platform == 'ubuntu' || matrix.platform == 'macos'
        shell: bash
        run: |
          mkdir -p ci-report

      - name: Prepare report directory (Windows MSVC)
        if: matrix.platform == 'windows-msvc'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path ci-report | Out-Null

      - name: Prepare report directory (Windows MSYS2)
        if: matrix.platform == 'windows-msys2'
        shell: msys2 {0}
        run: |
          mkdir -p ci-report

      - name: Run LottieExpressions sw 0 (POSIX)
        if: matrix.platform == 'ubuntu' || matrix.platform == 'macos'
        shell: bash
        run: |
          raw_log="ci-report/raw_${{ matrix.platform }}_${{ matrix.thorvg_subproject }}_${{ matrix.threads }}_sw_0.tmp"
          final_log="ci-report/${{ matrix.platform }}_${{ matrix.thorvg_subproject }}_${{ matrix.threads }}_sw_0.log"
          ./build/src/LottieExpressions sw 0 > "$raw_log" 2>&1
          status=$?
          tail -n 30 "$raw_log" > "$final_log"
          exit $status

      - name: Run LottieExpressions sw 4 (POSIX, thorvg-nors threaded)
        if: (matrix.platform == 'ubuntu' || matrix.platform == 'macos') && matrix.thorvg_subproject == 'thorvg-nors' && matrix.threads == true
        shell: bash
        run: |
          raw_log="ci-report/raw_${{ matrix.platform }}_${{ matrix.thorvg_subproject }}_${{ matrix.threads }}_sw_4.tmp"
          final_log="ci-report/${{ matrix.platform }}_${{ matrix.thorvg_subproject }}_${{ matrix.threads }}_sw_4.log"
          ./build/src/LottieExpressions sw 4 > "$raw_log" 2>&1
          status=$?
          tail -n 30 "$raw_log" > "$final_log"
          exit $status

      - name: Run LottieExpressions sw 0 (Windows MSVC)
        if: matrix.platform == 'windows-msvc'
        shell: powershell
        run: |
          $rawLog = "ci-report/raw_${{ matrix.platform }}_${{ matrix.thorvg_subproject }}_${{ matrix.threads }}_sw_0.tmp"
          $finalLog = "ci-report/${{ matrix.platform }}_${{ matrix.thorvg_subproject }}_${{ matrix.threads }}_sw_0.log"
          & .\build\src\LottieExpressions.exe sw 0 *>&1 | Tee-Object -FilePath $rawLog
          $status = $LASTEXITCODE
          Get-Content $rawLog -Tail 30 | Set-Content $finalLog
          exit $status

      - name: Run LottieExpressions sw 4 (Windows MSVC, thorvg-nors threaded)
        if: matrix.platform == 'windows-msvc' && matrix.thorvg_subproject == 'thorvg-nors' && matrix.threads == true
        shell: powershell
        run: |
          $rawLog = "ci-report/raw_${{ matrix.platform }}_${{ matrix.thorvg_subproject }}_${{ matrix.threads }}_sw_4.tmp"
          $finalLog = "ci-report/${{ matrix.platform }}_${{ matrix.thorvg_subproject }}_${{ matrix.threads }}_sw_4.log"
          & .\build\src\LottieExpressions.exe sw 4 *>&1 | Tee-Object -FilePath $rawLog
          $status = $LASTEXITCODE
          Get-Content $rawLog -Tail 30 | Set-Content $finalLog
          exit $status

      - name: Run LottieExpressions sw 0 (Windows MSYS2)
        if: matrix.platform == 'windows-msys2'
        shell: msys2 {0}
        run: |
          raw_log="ci-report/raw_${{ matrix.platform }}_${{ matrix.thorvg_subproject }}_${{ matrix.threads }}_sw_0.tmp"
          final_log="ci-report/${{ matrix.platform }}_${{ matrix.thorvg_subproject }}_${{ matrix.threads }}_sw_0.log"
          ./build/src/LottieExpressions.exe sw 0 > "$raw_log" 2>&1
          status=$?
          tail -n 30 "$raw_log" > "$final_log"
          exit $status

      - name: Run LottieExpressions sw 4 (Windows MSYS2, thorvg-nors threaded)
        if: matrix.platform == 'windows-msys2' && matrix.thorvg_subproject == 'thorvg-nors' && matrix.threads == true
        shell: msys2 {0}
        run: |
          raw_log="ci-report/raw_${{ matrix.platform }}_${{ matrix.thorvg_subproject }}_${{ matrix.threads }}_sw_4.tmp"
          final_log="ci-report/${{ matrix.platform }}_${{ matrix.thorvg_subproject }}_${{ matrix.threads }}_sw_4.log"
          ./build/src/LottieExpressions.exe sw 4 > "$raw_log" 2>&1
          status=$?
          tail -n 30 "$raw_log" > "$final_log"
          exit $status

      - name: Upload Lottie logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lottie-logs-${{ matrix.platform }}-${{ matrix.thorvg_subproject }}-${{ matrix.threads }}
          path: ci-report/*.log
          if-no-files-found: warn

  report:
    name: LottieExpressions Report
    if: ${{ always() }}
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download Lottie log artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-logs
          pattern: lottie-logs-*
          merge-multiple: false

      - name: Write Lottie summary
        shell: bash
        run: |
          echo "## LottieExpressions Log Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          shopt -s nullglob
          logs=(all-logs/*/*.log)
          if [ ${#logs[@]} -eq 0 ]; then
            echo "No log artifacts were collected." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          IFS=$'\n' sorted_logs=($(printf '%s\n' "${logs[@]}" | sort))
          unset IFS

          for log in "${sorted_logs[@]}"; do
            echo "### $(basename "$log")" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            cat "$log" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          done
