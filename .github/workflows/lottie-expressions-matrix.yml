name: LottieExpressions Matrix
run-name: Matrix (${{ inputs.platform }}, tick=${{ inputs.tick_count }})

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to run
        required: true
        default: all
        type: choice
        options:
          - all
          - ubuntu
          - macos
          - windows-msvc
          - windows-msys2
      tick_count:
        description: Tick count for LottieExpressions exit
        required: true
        default: '4000'
        type: string

permissions:
  contents: read
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(
        github.event.inputs.platform == 'ubuntu' &&
        '{"include":[{"platform":"ubuntu","runs_on":"ubuntu-latest"}]}' ||
        github.event.inputs.platform == 'macos' &&
        '{"include":[{"platform":"macos","runs_on":"macos-latest"}]}' ||
        github.event.inputs.platform == 'windows-msvc' &&
        '{"include":[{"platform":"windows-msvc","runs_on":"windows-latest"}]}' ||
        github.event.inputs.platform == 'windows-msys2' &&
        '{"include":[{"platform":"windows-msys2","runs_on":"windows-latest"}]}' ||
        '{"include":[{"platform":"ubuntu","runs_on":"ubuntu-latest"},{"platform":"macos","runs_on":"macos-latest"},{"platform":"windows-msvc","runs_on":"windows-latest"},{"platform":"windows-msys2","runs_on":"windows-latest"}]}'
        ) }}

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set Up Python
        if: matrix.platform == 'windows-msvc'
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Prepare vcpkg binary cache
        if: matrix.platform == 'windows-msvc'
        shell: powershell
        run: |
          $binaryCache = Join-Path $env:GITHUB_WORKSPACE '.cache\vcpkg-binary-cache'
          New-Item -ItemType Directory -Force -Path $binaryCache | Out-Null

      - name: Cache vcpkg binary cache
        if: matrix.platform == 'windows-msvc'
        uses: actions/cache@v5
        with:
          path: .cache/vcpkg-binary-cache
          key: windows-msvc-vcpkg-binary-${{ runner.os }}-${{ hashFiles('.github/workflows/lottie-expressions-matrix.yml') }}
          restore-keys: |
            windows-msvc-vcpkg-binary-${{ runner.os }}-

      - name: Load MSVC Build Environment
        if: matrix.platform == 'windows-msvc'
        shell: powershell
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          $vsInstallPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsInstallPath) {
            throw 'Visual Studio installation not found.'
          }
          $vsDevCmd = Join-Path $vsInstallPath 'Common7\Tools\VsDevCmd.bat'
          $envDump = cmd /c "`"$vsDevCmd`" -arch=x64 -host_arch=x64 >nul && set"
          foreach ($line in $envDump) {
            if ($line -notmatch '^([^=][^=]*)=(.*)$') {
              continue
            }
            $name = $matches[1]
            $value = $matches[2]
            $delimiter = [guid]::NewGuid().ToString()
            Add-Content $env:GITHUB_ENV "$name<<$delimiter"
            Add-Content $env:GITHUB_ENV $value
            Add-Content $env:GITHUB_ENV $delimiter
          }

      - name: Set Up MSYS2
        if: matrix.platform == 'windows-msys2'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            git
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-meson
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-SDL2

      - name: Install Packages (Ubuntu)
        if: matrix.platform == 'ubuntu'
        shell: bash
        run: |
          packages=(meson ninja-build libsdl2-dev libgl1-mesa-dev)
          missing=()
          for pkg in "${packages[@]}"; do
            if ! dpkg-query -W -f='${Status}' "$pkg" 2>/dev/null | grep -q "install ok installed"; then
              missing+=("$pkg")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            sudo apt-get update
            sudo apt-get install -y "${missing[@]}"
          else
            echo "Ubuntu packages already installed."
          fi

      - name: Install Packages (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          formulae=(meson ninja sdl2 libomp)
          missing=()
          for formula in "${formulae[@]}"; do
            if ! brew list --formula "$formula" >/dev/null 2>&1; then
              missing+=("$formula")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            brew update
            brew install "${missing[@]}"
          else
            echo "Homebrew packages already installed."
          fi
          echo "PKG_CONFIG_PATH=$(brew --prefix)/lib/pkgconfig:$(brew --prefix sdl2)/lib/pkgconfig:$(brew --prefix libomp)/lib/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}" >> "$GITHUB_ENV"
          echo "CPPFLAGS=-I$(brew --prefix libomp)/include${CPPFLAGS:+ $CPPFLAGS}" >> "$GITHUB_ENV"
          echo "LDFLAGS=-L$(brew --prefix libomp)/lib -Wl,-rpath,$(brew --prefix libomp)/lib${LDFLAGS:+ $LDFLAGS}" >> "$GITHUB_ENV"

      - name: Install Packages (Windows MSVC)
        if: matrix.platform == 'windows-msvc'
        shell: powershell
        run: |
          $needPipPackages = -not (Get-Command meson -ErrorAction SilentlyContinue) -or -not (Get-Command ninja -ErrorAction SilentlyContinue)
          if ($needPipPackages) {
            python -m pip install --upgrade pip
          }
          if (-not (Get-Command meson -ErrorAction SilentlyContinue)) {
            python -m pip install meson
          } else {
            Write-Host "meson is already installed."
          }
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            python -m pip install ninja
          } else {
            Write-Host "ninja is already installed."
          }
          if (-not (Get-Command pkg-config -ErrorAction SilentlyContinue)) {
            choco install pkgconfiglite -y
          } else {
            Write-Host "pkg-config is already installed."
          }
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP 'vcpkg'
          $binaryCache = Join-Path $env:GITHUB_WORKSPACE '.cache\vcpkg-binary-cache'
          git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
          $env:VCPKG_ROOT = $vcpkgRoot
          $env:VCPKG_DEFAULT_BINARY_CACHE = $binaryCache
          $env:VCPKG_BINARY_SOURCES = "clear;files,$binaryCache,readwrite"
          & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
          $sdl2Pc = Join-Path $vcpkgRoot 'installed\x64-windows\lib\pkgconfig\sdl2.pc'
          if (-not (Test-Path $sdl2Pc)) {
            $maxAttempts = 3
            for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
              & "$vcpkgRoot\vcpkg.exe" --vcpkg-root "$vcpkgRoot" install sdl2:x64-windows
              if ($LASTEXITCODE -eq 0) {
                break
              }
              if ($attempt -eq $maxAttempts) {
                exit $LASTEXITCODE
              }
              Write-Host "vcpkg install failed on attempt $attempt/$maxAttempts. Retrying after backoff..."
              Start-Sleep -Seconds (15 * $attempt)
            }
          } else {
            Write-Host "SDL2 is already installed in vcpkg."
          }
          "VCPKG_DEFAULT_BINARY_CACHE=$binaryCache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKG_BINARY_SOURCES=clear;files,$binaryCache,readwrite" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PKG_CONFIG_PATH=$vcpkgRoot\installed\x64-windows\lib\pkgconfig;$vcpkgRoot\installed\x64-windows\share\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CMAKE_PREFIX_PATH=$vcpkgRoot\installed\x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$vcpkgRoot\installed\x64-windows\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Prepare report directory (POSIX)
        if: matrix.platform == 'ubuntu' || matrix.platform == 'macos'
        shell: bash
        run: |
          mkdir -p ci-report

      - name: Prepare report directory (Windows MSVC)
        if: matrix.platform == 'windows-msvc'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path ci-report | Out-Null

      - name: Prepare report directory (Windows MSYS2)
        if: matrix.platform == 'windows-msys2'
        shell: msys2 {0}
        run: |
          mkdir -p ci-report

      - name: Build and Run Variants (POSIX)
        if: matrix.platform == 'ubuntu' || matrix.platform == 'macos'
        shell: bash
        run: |
          setup_args=(-Dbuildtype=release -Doptimization=s)

          run_case() {
            subproject="$1"
            threads="$2"
            threadcnt="$3"
            build_dir="build-${subproject}-${threads}"
            raw_log="ci-report/raw_${{ matrix.platform }}_${subproject}_${threads}_sw_${threadcnt}.tmp"
            final_log="ci-report/${{ matrix.platform }}_${subproject}_${threads}_sw_${threadcnt}.log"

            meson setup --wipe "$build_dir" "${setup_args[@]}" -Dthorvg_subproject="$subproject" -Dthreads="$threads"
            meson compile -C "$build_dir"
            "./${build_dir}/src/LottieExpressions" sw "$threadcnt" "${{ inputs.tick_count }}" > "$raw_log" 2>&1
            status=$?
            tail -n 30 "$raw_log" > "$final_log"
            return $status
          }

          run_case thorvg-main false 0
          run_case thorvg-nors false 0
          run_case thorvg-nors true 0
          run_case thorvg-nors true 4

      - name: Build and Run Variants (Windows MSVC)
        if: matrix.platform == 'windows-msvc'
        shell: powershell
        run: |
          $setupArgs = @("-Dbuildtype=release", "-Doptimization=s")

          function Invoke-Case {
            param(
              [string]$Subproject,
              [string]$Threads,
              [string]$ThreadCnt
            )

            $buildDir = "build-$Subproject-$Threads"
            $rawLog = "ci-report/raw_${{ matrix.platform }}_${Subproject}_${Threads}_sw_${ThreadCnt}.tmp"
            $finalLog = "ci-report/${{ matrix.platform }}_${Subproject}_${Threads}_sw_${ThreadCnt}.log"

            meson setup --wipe $buildDir @setupArgs "-Dthorvg_subproject=$Subproject" "-Dthreads=$Threads"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

            meson compile -C $buildDir
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

            & ".\$buildDir\src\LottieExpressions.exe" sw $ThreadCnt "${{ inputs.tick_count }}" *>&1 | Tee-Object -FilePath $rawLog
            $status = $LASTEXITCODE
            Get-Content $rawLog -Tail 30 | Set-Content $finalLog
            if ($status -ne 0) { exit $status }
          }

          Invoke-Case -Subproject thorvg-main -Threads false -ThreadCnt 0
          Invoke-Case -Subproject thorvg-nors -Threads false -ThreadCnt 0
          Invoke-Case -Subproject thorvg-nors -Threads true -ThreadCnt 0
          Invoke-Case -Subproject thorvg-nors -Threads true -ThreadCnt 4

      - name: Build and Run Variants (Windows MSYS2)
        if: matrix.platform == 'windows-msys2'
        shell: msys2 {0}
        run: |
          setup_args=(-Dbuildtype=release -Doptimization=s)

          run_case() {
            subproject="$1"
            threads="$2"
            threadcnt="$3"
            build_dir="build-${subproject}-${threads}"
            raw_log="ci-report/raw_${{ matrix.platform }}_${subproject}_${threads}_sw_${threadcnt}.tmp"
            final_log="ci-report/${{ matrix.platform }}_${subproject}_${threads}_sw_${threadcnt}.log"

            meson setup --wipe "$build_dir" "${setup_args[@]}" -Dthorvg_subproject="$subproject" -Dthreads="$threads"
            meson compile -C "$build_dir"
            "./${build_dir}/src/LottieExpressions.exe" sw "$threadcnt" "${{ inputs.tick_count }}" > "$raw_log" 2>&1
            status=$?
            tail -n 30 "$raw_log" > "$final_log"
            return $status
          }

          run_case thorvg-main false 0
          run_case thorvg-nors false 0
          run_case thorvg-nors true 0
          run_case thorvg-nors true 4

      - name: Upload Lottie logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lottie-logs-${{ matrix.platform }}
          path: |
            ci-report/*.log
          if-no-files-found: warn

  report:
    name: LottieExpressions Report
    if: ${{ always() }}
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download Lottie log artifacts
        uses: actions/download-artifact@v8
        with:
          path: all-logs
          pattern: lottie-logs-*
          merge-multiple: false

      - name: Write Lottie summary
        shell: bash
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          logs = sorted(Path("all-logs").glob("*/*.log"))

          if not logs:
              summary_path.write_text("## LottieExpressions Summary (tickCnt=${{ inputs.tick_count }})\n\nNo log artifacts were collected.\n", encoding="utf-8")
              raise SystemExit(0)

          platform_labels = {
              "macos": "Mac",
              "ubuntu": "Ubuntu",
              "windows-msvc": "Windows MSVC",
              "windows-msys2": "Windows MSYS2",
          }

          fps_by_key = {}
          fps_pattern = re.compile(r"\[\s*\d+\]:\s*([0-9.]+)\s*/\s*([0-9.]+)\s+fps")

          for log in logs:
              name = log.name.removesuffix(".log")
              parts = name.split("_")
              if len(parts) != 5:
                  continue
              platform, subproject, thread_flag, engine, sw_value = parts
              if engine != "sw":
                  continue

              lines = log.read_text(encoding="utf-8", errors="replace").splitlines()
              avg_fps = None
              for line in reversed(lines):
                  match = fps_pattern.search(line)
                  if match:
                      avg_fps = float(match.group(2))
                      break

              if avg_fps is None:
                  continue

              fps_by_key[(platform, subproject, thread_flag, sw_value)] = avg_fps

          def format_delta(base, target):
              pct = ((target / base) - 1.0) * 100.0
              sign = "+" if pct > 0 else ""
              return f"{sign}{pct:.2f}% ({base:.2f} -> {target:.2f} fps)"

          def comparison_line(label, base_key, target_key):
              base = fps_by_key.get(base_key)
              target = fps_by_key.get(target_key)
              if base is None or target is None:
                  return f"- {label} -> n/a"
              if abs(target - base) < 0.005:
                  return f"- {label} -> 0%"
              return f"- {label} -> {format_delta(base, target)}"

          platforms = [p for p in platform_labels if any(key[0] == p for key in fps_by_key)]
          lines = ["## LottieExpressions Summary (tickCnt=${{ inputs.tick_count }})", ""]

          for index, platform in enumerate(platforms):
              lines.append(f"### {platform_labels[platform]}")
              lines.append("")
              lines.append("#### 1. thread option enabled")
              lines.append("")
              lines.append(
                  comparison_line(
                      "feature + 0 threads",
                      (platform, "thorvg-main", "false", "0"),
                      (platform, "thorvg-nors", "true", "0"),
                  )
              )
              lines.append(
                  comparison_line(
                      "feature + 4 threads",
                      (platform, "thorvg-main", "false", "0"),
                      (platform, "thorvg-nors", "true", "4"),
                  )
              )
              lines.append("")
              lines.append("#### 2. thread option disabled")
              lines.append("")
              lines.append(
                  comparison_line(
                      "feature + 0 threads",
                      (platform, "thorvg-main", "false", "0"),
                      (platform, "thorvg-nors", "false", "0"),
                  )
              )
              if index != len(platforms) - 1:
                  lines.append("")
                  lines.append("---")
                  lines.append("")

          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY