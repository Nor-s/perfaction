name: LottieExpressions Compare
run-name: Compare (main vs ${{ inputs.branch }}) (tick=${{ inputs.tick_count }})

on:
  workflow_dispatch:
    inputs:
      branch:
        description: ThorVG branch to merge into main locally
        required: true
        type: string
      tick_count:
        description: Tick count for LottieExpressions exit
        required: true
        default: '4000'
        type: string

permissions:
  contents: read
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.platform }} / ${{ matrix.variant.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu
            runs_on: ubuntu-latest
            variant:
              name: thorvg-main / threads=false / sw=0
              subproject: thorvg-main
              threads: 'false'
              sw: '0'
          - platform: ubuntu
            runs_on: ubuntu-latest
            variant:
              name: thorvg-main / threads=true / sw=0
              subproject: thorvg-main
              threads: 'true'
              sw: '0'
          - platform: ubuntu
            runs_on: ubuntu-latest
            variant:
              name: thorvg-main / threads=false / sw=4
              subproject: thorvg-main
              threads: 'false'
              sw: '4'
          - platform: ubuntu
            runs_on: ubuntu-latest
            variant:
              name: thorvg-main / threads=true / sw=4
              subproject: thorvg-main
              threads: 'true'
              sw: '4'
          - platform: macos
            runs_on: macos-latest
            variant:
              name: thorvg-main / threads=false / sw=0
              subproject: thorvg-main
              threads: 'false'
              sw: '0'
          - platform: macos
            runs_on: macos-latest
            variant:
              name: thorvg-main / threads=true / sw=0
              subproject: thorvg-main
              threads: 'true'
              sw: '0'
          - platform: macos
            runs_on: macos-latest
            variant:
              name: thorvg-main / threads=false / sw=4
              subproject: thorvg-main
              threads: 'false'
              sw: '4'
          - platform: macos
            runs_on: macos-latest
            variant:
              name: thorvg-main / threads=true / sw=4
              subproject: thorvg-main
              threads: 'true'
              sw: '4'
          - platform: windows-msvc
            runs_on: windows-latest
            variant:
              name: thorvg-main / threads=false / sw=0
              subproject: thorvg-main
              threads: 'false'
              sw: '0'
          - platform: windows-msvc
            runs_on: windows-latest
            variant:
              name: thorvg-main / threads=true / sw=0
              subproject: thorvg-main
              threads: 'true'
              sw: '0'
          - platform: windows-msvc
            runs_on: windows-latest
            variant:
              name: thorvg-main / threads=false / sw=4
              subproject: thorvg-main
              threads: 'false'
              sw: '4'
          - platform: windows-msvc
            runs_on: windows-latest
            variant:
              name: thorvg-main / threads=true / sw=4
              subproject: thorvg-main
              threads: 'true'
              sw: '4'
          - platform: windows-msys2
            runs_on: windows-latest
            variant:
              name: thorvg-main / threads=false / sw=0
              subproject: thorvg-main
              threads: 'false'
              sw: '0'
          - platform: windows-msys2
            runs_on: windows-latest
            variant:
              name: thorvg-main / threads=true / sw=0
              subproject: thorvg-main
              threads: 'true'
              sw: '0'
          - platform: windows-msys2
            runs_on: windows-latest
            variant:
              name: thorvg-main / threads=false / sw=4
              subproject: thorvg-main
              threads: 'false'
              sw: '4'
          - platform: windows-msys2
            runs_on: windows-latest
            variant:
              name: thorvg-main / threads=true / sw=4
              subproject: thorvg-main
              threads: 'true'
              sw: '4'

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set Up Python
        if: matrix.platform == 'windows-msvc'
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Prepare vcpkg binary cache
        if: matrix.platform == 'windows-msvc'
        shell: powershell
        run: |
          $binaryCache = Join-Path $env:GITHUB_WORKSPACE '.cache\vcpkg-binary-cache'
          New-Item -ItemType Directory -Force -Path $binaryCache | Out-Null

      - name: Cache vcpkg binary cache
        if: matrix.platform == 'windows-msvc'
        uses: actions/cache@v5
        with:
          path: .cache/vcpkg-binary-cache
          key: windows-msvc-vcpkg-binary-${{ runner.os }}-${{ hashFiles('.github/workflows/lottie-expressions-matrix.yml') }}
          restore-keys: |
            windows-msvc-vcpkg-binary-${{ runner.os }}-

      - name: Load MSVC Build Environment
        if: matrix.platform == 'windows-msvc'
        shell: powershell
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          $vsInstallPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsInstallPath) {
            throw 'Visual Studio installation not found.'
          }
          $vsDevCmd = Join-Path $vsInstallPath 'Common7\Tools\VsDevCmd.bat'
          $envDump = cmd /c "`"$vsDevCmd`" -arch=x64 -host_arch=x64 >nul && set"
          foreach ($line in $envDump) {
            if ($line -notmatch '^([^=][^=]*)=(.*)$') {
              continue
            }
            $name = $matches[1]
            $value = $matches[2]
            $delimiter = [guid]::NewGuid().ToString()
            Add-Content $env:GITHUB_ENV "$name<<$delimiter"
            Add-Content $env:GITHUB_ENV $value
            Add-Content $env:GITHUB_ENV $delimiter
          }

      - name: Set Up MSYS2
        if: matrix.platform == 'windows-msys2'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            git
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-meson
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-SDL2

      - name: Install Packages (Ubuntu)
        if: matrix.platform == 'ubuntu'
        shell: bash
        run: |
          packages=(meson ninja-build libsdl2-dev libgl1-mesa-dev)
          missing=()
          for pkg in "${packages[@]}"; do
            if ! dpkg-query -W -f='${Status}' "$pkg" 2>/dev/null | grep -q "install ok installed"; then
              missing+=("$pkg")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            sudo apt-get update
            sudo apt-get install -y "${missing[@]}"
          else
            echo "Ubuntu packages already installed."
          fi

      - name: Install Packages (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          formulae=(meson ninja sdl2 libomp)
          missing=()
          for formula in "${formulae[@]}"; do
            if ! brew list --formula "$formula" >/dev/null 2>&1; then
              missing+=("$formula")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            brew update
            brew install "${missing[@]}"
          else
            echo "Homebrew packages already installed."
          fi
          echo "PKG_CONFIG_PATH=$(brew --prefix)/lib/pkgconfig:$(brew --prefix sdl2)/lib/pkgconfig:$(brew --prefix libomp)/lib/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}" >> "$GITHUB_ENV"
          echo "CPPFLAGS=-I$(brew --prefix libomp)/include${CPPFLAGS:+ $CPPFLAGS}" >> "$GITHUB_ENV"
          echo "LDFLAGS=-L$(brew --prefix libomp)/lib -Wl,-rpath,$(brew --prefix libomp)/lib${LDFLAGS:+ $LDFLAGS}" >> "$GITHUB_ENV"

      - name: Install Packages (Windows MSVC)
        if: matrix.platform == 'windows-msvc'
        shell: powershell
        run: |
          $needPipPackages = -not (Get-Command meson -ErrorAction SilentlyContinue) -or -not (Get-Command ninja -ErrorAction SilentlyContinue)
          if ($needPipPackages) {
            python -m pip install --upgrade pip
          }
          if (-not (Get-Command meson -ErrorAction SilentlyContinue)) {
            python -m pip install meson
          } else {
            Write-Host "meson is already installed."
          }
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            python -m pip install ninja
          } else {
            Write-Host "ninja is already installed."
          }
          if (-not (Get-Command pkg-config -ErrorAction SilentlyContinue)) {
            choco install pkgconfiglite -y
          } else {
            Write-Host "pkg-config is already installed."
          }
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP 'vcpkg'
          $binaryCache = Join-Path $env:GITHUB_WORKSPACE '.cache\vcpkg-binary-cache'
          git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
          $env:VCPKG_ROOT = $vcpkgRoot
          $env:VCPKG_DEFAULT_BINARY_CACHE = $binaryCache
          $env:VCPKG_BINARY_SOURCES = "clear;files,$binaryCache,readwrite"
          & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
          $sdl2Pc = Join-Path $vcpkgRoot 'installed\x64-windows\lib\pkgconfig\sdl2.pc'
          if (-not (Test-Path $sdl2Pc)) {
            $maxAttempts = 3
            for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
              & "$vcpkgRoot\vcpkg.exe" --vcpkg-root "$vcpkgRoot" install sdl2:x64-windows
              if ($LASTEXITCODE -eq 0) {
                break
              }
              if ($attempt -eq $maxAttempts) {
                exit $LASTEXITCODE
              }
              Start-Sleep -Seconds (15 * $attempt)
            }
          } else {
            Write-Host "SDL2 is already installed in vcpkg."
          }
          "VCPKG_DEFAULT_BINARY_CACHE=$binaryCache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKG_BINARY_SOURCES=clear;files,$binaryCache,readwrite" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PKG_CONFIG_PATH=$vcpkgRoot\installed\x64-windows\lib\pkgconfig;$vcpkgRoot\installed\x64-windows\share\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CMAKE_PREFIX_PATH=$vcpkgRoot\installed\x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$vcpkgRoot\installed\x64-windows\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Prepare report directory (POSIX)
        if: matrix.platform == 'ubuntu' || matrix.platform == 'macos'
        shell: bash
        run: |
          mkdir -p ci-report

      - name: Prepare report directory (Windows MSVC)
        if: matrix.platform == 'windows-msvc'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path ci-report | Out-Null

      - name: Prepare report directory (Windows MSYS2)
        if: matrix.platform == 'windows-msys2'
        shell: msys2 {0}
        run: |
          mkdir -p ci-report

      - name: Detect Available Cores (POSIX)
        if: matrix.platform == 'ubuntu' || matrix.platform == 'macos'
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "macos" ]; then
            cores="$(sysctl -n hw.ncpu)"
          else
            cores="$(nproc)"
          fi
          printf 'Available cores on %s: %s\n' "${{ matrix.platform }}" "$cores"
          printf '%s' "$cores" > "ci-report/${{ matrix.platform }}_cores.txt"

      - name: Detect Available Cores (Windows MSVC)
        if: matrix.platform == 'windows-msvc'
        shell: powershell
        run: |
          $cores = [Environment]::ProcessorCount
          Write-Host "Available cores on windows-msvc: $cores"
          [IO.File]::WriteAllText("ci-report/windows-msvc_cores.txt", "$cores")

      - name: Detect Available Cores (Windows MSYS2)
        if: matrix.platform == 'windows-msys2'
        shell: msys2 {0}
        run: |
          cores="$(nproc)"
          printf 'Available cores on windows-msys2: %s\n' "$cores"
          printf '%s' "$cores" > "ci-report/windows-msys2_cores.txt"

      - name: Compare LottieExpressions (POSIX)
        if: matrix.platform == 'ubuntu' || matrix.platform == 'macos'
        shell: bash
        run: |
          repo_root="$PWD"
          target_branch="${{ github.event.inputs.branch }}"
          subproject_dir="subprojects/${{ matrix.variant.subproject }}"
          platform="${{ matrix.platform }}"
          subproject="${{ matrix.variant.subproject }}"
          threads="${{ matrix.variant.threads }}"
          sw="${{ matrix.variant.sw }}"

          collect_perf() {
            state="$1"
            build_dir="build-${state}"
            raw_log="${repo_root}/ci-report/raw_${platform}_${subproject}_${threads}_${state}_sw_${sw}.tmp"
            final_log="${repo_root}/ci-report/${platform}_${subproject}_${threads}_${state}_sw_${sw}.log"
            metrics_file="${repo_root}/ci-report/${platform}_${subproject}_${threads}_${state}_sw_${sw}_metrics.txt"

            meson setup --wipe "$build_dir" \
              -Dbuildtype=release \
              -Doptimization=s \
              -Dthorvg_subproject="$subproject" \
              -Dthreads="$threads"
            meson compile -C "$build_dir"

            if [ "$platform" = "ubuntu" ]; then
              /usr/bin/time -v -o "$metrics_file" "./${build_dir}/src/LottieExpressions" sw "$sw" "${{ inputs.tick_count }}" > "$raw_log" 2>&1
              status=$?
              python3 -c "import re, sys, pathlib; state=sys.argv[1]; metrics_path=pathlib.Path(sys.argv[2]); out_path=pathlib.Path(sys.argv[3]); text=metrics_path.read_text(encoding='utf-8', errors='replace'); patterns={'rss_kb': r'Maximum resident set size \\(kbytes\\):\\s*(\\d+)', 'user_sec': r'User time \\(seconds\\):\\s*([0-9.]+)', 'sys_sec': r'System time \\(seconds\\):\\s*([0-9.]+)', 'elapsed': r'Elapsed \\(wall clock\\) time \\(h:mm:ss or m:ss\\):\\s*([0-9:.]+)', 'vol_cs': r'Voluntary context switches:\\s*(\\d+)', 'invol_cs': r'Involuntary context switches:\\s*(\\d+)'}; extract=lambda key: (re.search(patterns[key], text).group(1) if re.search(patterns[key], text) else ''); elapsed_raw=extract('elapsed'); elapsed=''; parts=elapsed_raw.split(':') if elapsed_raw else []; elapsed=(f'{sum(float(part) * factor for part, factor in zip(parts, [3600, 60, 1][-len(parts):])):.3f}s' if parts else ''); values=[state, extract('rss_kb'), extract('user_sec'), extract('sys_sec'), elapsed, extract('vol_cs'), extract('invol_cs')]; out_path.open('a', encoding='utf-8').write('\\t'.join(values)+'\\n')" "$state" "$metrics_file" "${repo_root}/ci-report/${platform}_${subproject}_${threads}_sw_${sw}_runtime_metrics.tsv"
              python3 -c "import re, sys, pathlib; state=sys.argv[1]; metrics_path=pathlib.Path(sys.argv[2]); out_path=pathlib.Path(sys.argv[3]); text=metrics_path.read_text(encoding='utf-8', errors='replace'); m=re.search(r'Elapsed \\(wall clock\\) time \\(h:mm:ss or m:ss\\):\\s*([0-9:.]+)', text); elapsed='n/a'; raw=m.group(1) if m else ''; parts=raw.split(':') if raw else []; elapsed=(f'{sum(float(part) * factor for part, factor in zip(parts, [3600, 60, 1][-len(parts):])):.3f}s' if parts else 'n/a'); out_path.open('a', encoding='utf-8').write(f'{state}\\t{elapsed}\\n')" "$state" "$metrics_file" "${repo_root}/ci-report/${platform}_${subproject}_${threads}_sw_${sw}_elapsed_metrics.tsv"
            else
              /usr/bin/time -p -o "$metrics_file" "./${build_dir}/src/LottieExpressions" sw "$sw" "${{ inputs.tick_count }}" > "$raw_log" 2>&1
              status=$?
              elapsed="$(awk '/^real / {print $2 "s"}' "$metrics_file" | head -n 1)"
              printf '%s\t%s\n' "$state" "${elapsed:-n/a}" >> "${repo_root}/ci-report/${platform}_${subproject}_${threads}_sw_${sw}_elapsed_metrics.tsv"
            fi

            tail -n 30 "$raw_log" > "$final_log"
            return $status
          }

          {
            printf 'branch\t%s\n' "$target_branch"
            printf 'subproject\t%s\n' "$subproject"
            printf 'threads\t%s\n' "$threads"
            printf 'sw\t%s\n' "$sw"
          } > "${repo_root}/ci-report/${platform}_${subproject}_${threads}_sw_${sw}_merge_status.tsv"
          : > "${repo_root}/ci-report/${platform}_${subproject}_${threads}_sw_${sw}_runtime_metrics.tsv"
          : > "${repo_root}/ci-report/${platform}_${subproject}_${threads}_sw_${sw}_elapsed_metrics.tsv"
          : > "${repo_root}/ci-report/${platform}_${subproject}_${threads}_sw_${sw}_feature_commits.txt"

          pushd "$subproject_dir" > /dev/null
          main_commit="$(git rev-parse HEAD^{commit})"
          if [ "$target_branch" = "main" ]; then
            feature_commit="$main_commit"
          else
            git fetch origin "refs/heads/${target_branch}"
            feature_commit="$(git rev-parse FETCH_HEAD^{commit})"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout --detach "${main_commit}"
          popd > /dev/null
          collect_perf base

          if [ "$target_branch" = "main" ]; then
            printf 'status\tmerged\n' >> "${repo_root}/ci-report/${platform}_${subproject}_${threads}_sw_${sw}_merge_status.tsv"
          else
            pushd "$subproject_dir" > /dev/null
            git switch -C ci-merge-check "${main_commit}"
            if ! git merge --no-commit --no-ff "${feature_commit}"; then
              printf 'status\tmerge-conflict\n' >> "${repo_root}/ci-report/${platform}_${subproject}_${threads}_sw_${sw}_merge_status.tsv"
              git merge --abort || true
              popd > /dev/null
              exit 1
            fi
            printf 'status\tmerged\n' >> "${repo_root}/ci-report/${platform}_${subproject}_${threads}_sw_${sw}_merge_status.tsv"
            git log --oneline --no-merges "${main_commit}..${feature_commit}" > "${repo_root}/ci-report/${platform}_${subproject}_${threads}_sw_${sw}_feature_commits.txt" || true
            popd > /dev/null
          fi

          collect_perf merged

      - name: Compare LottieExpressions (Windows MSVC)
        if: matrix.platform == 'windows-msvc'
        shell: powershell
        run: |
          $repoRoot = $PWD.Path
          $targetBranch = "${{ github.event.inputs.branch }}"
          $subproject = "${{ matrix.variant.subproject }}"
          $threads = "${{ matrix.variant.threads }}"
          $sw = "${{ matrix.variant.sw }}"
          $subprojectDir = "subprojects/$subproject"
          $platform = "${{ matrix.platform }}"

          function Invoke-Perf {
            param([string]$State)

            $buildDir = "build-$State"
            $rawLog = "ci-report/raw_${platform}_${subproject}_${threads}_${State}_sw_${sw}.tmp"
            $finalLog = "ci-report/${platform}_${subproject}_${threads}_${State}_sw_${sw}.log"

            meson setup --wipe $buildDir "-Dbuildtype=release" "-Doptimization=s" "-Dthorvg_subproject=$subproject" "-Dthreads=$threads"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            meson compile -C $buildDir
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            $stopwatch = [System.Diagnostics.Stopwatch]::StartNew()
            & ".\$buildDir\src\LottieExpressions.exe" sw "$sw" "${{ inputs.tick_count }}" *>&1 | Tee-Object -FilePath $rawLog
            $stopwatch.Stop()
            $status = $LASTEXITCODE
            $elapsed = [string]::Format([System.Globalization.CultureInfo]::InvariantCulture, "{0:F3}s", $stopwatch.Elapsed.TotalSeconds)
            "$State`t$elapsed" | Add-Content "ci-report/${platform}_${subproject}_${threads}_sw_${sw}_elapsed_metrics.tsv"
            Get-Content $rawLog -Tail 30 | Set-Content $finalLog
            if ($status -ne 0) { exit $status }
          }

          @(
            "branch`t$targetBranch"
            "subproject`t$subproject"
            "threads`t$threads"
            "sw`t$sw"
          ) | Set-Content "ci-report/${platform}_${subproject}_${threads}_sw_${sw}_merge_status.tsv"
          "" | Set-Content "ci-report/${platform}_${subproject}_${threads}_sw_${sw}_elapsed_metrics.tsv"
          "" | Set-Content "ci-report/${platform}_${subproject}_${threads}_sw_${sw}_feature_commits.txt"
          Set-Location $subprojectDir
          $mainCommit = (git rev-parse "HEAD^{commit}").Trim()
          if ($targetBranch -eq "main") {
            $featureCommit = $mainCommit
          } else {
            git fetch origin "refs/heads/$targetBranch"
            $featureCommit = (git rev-parse "FETCH_HEAD^{commit}").Trim()
          }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --detach $mainCommit
          Set-Location $repoRoot
          Invoke-Perf -State base

          if ($targetBranch -eq "main") {
            "status`tmerged" | Add-Content "$repoRoot/ci-report/${platform}_${subproject}_${threads}_sw_${sw}_merge_status.tsv"
          } else {
            Set-Location $subprojectDir
            git checkout -B ci-merge-check $mainCommit
            git merge --no-commit --no-ff $featureCommit
            if ($LASTEXITCODE -ne 0) {
              "status`tmerge-conflict" | Add-Content "$repoRoot/ci-report/${platform}_${subproject}_${threads}_sw_${sw}_merge_status.tsv"
              git merge --abort
              exit $LASTEXITCODE
            }
            "status`tmerged" | Add-Content "$repoRoot/ci-report/${platform}_${subproject}_${threads}_sw_${sw}_merge_status.tsv"
            git log --oneline --no-merges "$mainCommit..$featureCommit" | Set-Content "$repoRoot/ci-report/${platform}_${subproject}_${threads}_sw_${sw}_feature_commits.txt"
            Set-Location $repoRoot
          }
          Invoke-Perf -State merged

      - name: Compare LottieExpressions (Windows MSYS2)
        if: matrix.platform == 'windows-msys2'
        shell: msys2 {0}
        run: |
          repo_root="$PWD"
          target_branch="${{ github.event.inputs.branch }}"
          subproject="${{ matrix.variant.subproject }}"
          threads="${{ matrix.variant.threads }}"
          sw="${{ matrix.variant.sw }}"
          subproject_dir="subprojects/${subproject}"
          platform="${{ matrix.platform }}"

          collect_perf() {
            state="$1"
            build_dir="build-${state}"
            raw_log="${repo_root}/ci-report/raw_${platform}_${subproject}_${threads}_${state}_sw_${sw}.tmp"
            final_log="${repo_root}/ci-report/${platform}_${subproject}_${threads}_${state}_sw_${sw}.log"

            meson setup --wipe "$build_dir" \
              -Dbuildtype=release \
              -Doptimization=s \
              -Dthorvg_subproject="$subproject" \
              -Dthreads="$threads"
            meson compile -C "$build_dir"
            start_ns="$(date +%s%N)"
            "./${build_dir}/src/LottieExpressions.exe" sw "$sw" "${{ inputs.tick_count }}" > "$raw_log" 2>&1
            status=$?
            end_ns="$(date +%s%N)"
            elapsed="$(awk -v start="$start_ns" -v end="$end_ns" 'BEGIN { printf "%.3fs", (end - start) / 1000000000 }')"
            printf '%s\t%s\n' "$state" "$elapsed" >> "${repo_root}/ci-report/${platform}_${subproject}_${threads}_sw_${sw}_elapsed_metrics.tsv"
            tail -n 30 "$raw_log" > "$final_log"
            return $status
          }

          {
            printf 'branch\t%s\n' "$target_branch"
            printf 'subproject\t%s\n' "$subproject"
            printf 'threads\t%s\n' "$threads"
            printf 'sw\t%s\n' "$sw"
          } > "${repo_root}/ci-report/${platform}_${subproject}_${threads}_sw_${sw}_merge_status.tsv"
          : > "${repo_root}/ci-report/${platform}_${subproject}_${threads}_sw_${sw}_runtime_metrics.tsv"
          : > "${repo_root}/ci-report/${platform}_${subproject}_${threads}_sw_${sw}_elapsed_metrics.tsv"
          : > "${repo_root}/ci-report/${platform}_${subproject}_${threads}_sw_${sw}_feature_commits.txt"

          pushd "$subproject_dir" > /dev/null
          main_commit="$(git rev-parse HEAD^{commit})"
          if [ "$target_branch" = "main" ]; then
            feature_commit="$main_commit"
          else
            git fetch origin "refs/heads/${target_branch}"
            feature_commit="$(git rev-parse FETCH_HEAD^{commit})"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout --detach "${main_commit}"
          popd > /dev/null
          collect_perf base

          if [ "$target_branch" = "main" ]; then
            printf 'status\tmerged\n' >> "${repo_root}/ci-report/${platform}_${subproject}_${threads}_sw_${sw}_merge_status.tsv"
          else
            pushd "$subproject_dir" > /dev/null
            git switch -C ci-merge-check "${main_commit}"
            if ! git merge --no-commit --no-ff "${feature_commit}"; then
              printf 'status\tmerge-conflict\n' >> "${repo_root}/ci-report/${platform}_${subproject}_${threads}_sw_${sw}_merge_status.tsv"
              git merge --abort || true
              popd > /dev/null
              exit 1
            fi
            printf 'status\tmerged\n' >> "${repo_root}/ci-report/${platform}_${subproject}_${threads}_sw_${sw}_merge_status.tsv"
            git log --oneline --no-merges "${main_commit}..${feature_commit}" > "${repo_root}/ci-report/${platform}_${subproject}_${threads}_sw_${sw}_feature_commits.txt" || true
            popd > /dev/null
          fi

          collect_perf merged

      - name: Upload Compare Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lottie-expressions-compare-${{ matrix.platform }}-${{ matrix.variant.subproject }}-${{ matrix.variant.threads }}-sw${{ matrix.variant.sw }}
          path: |
            ci-report/*.log
            ci-report/*.tsv
            ci-report/*.txt
          if-no-files-found: warn

  report:
    name: LottieExpressions Report
    if: ${{ always() }}
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download Compare Artifacts
        uses: actions/download-artifact@v8
        with:
          path: all-report
          pattern: lottie-expressions-compare-*
          merge-multiple: true

      - name: Write Compare Summary
        shell: bash
        env:
          BRANCH_NAME: ${{ github.event.inputs.branch }}
          TICK_COUNT: ${{ github.event.inputs.tick_count }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          branch_name = os.environ["BRANCH_NAME"]
          root = Path("all-report")

          platforms = {
              "ubuntu": "Ubuntu",
              "macos": "Mac",
              "windows-msvc": "Windows MSVC",
              "windows-msys2": "Windows MSYS2",
          }

          lines = [
              f"## LottieExpressions (main vs {branch_name}) (tickCnt={os.environ['TICK_COUNT']})",
              "",
          ]

          variant_defs = [
              ("thorvg-main", "false", "0", "thorvg-main / threads=false / sw=0"),
              ("thorvg-main", "true", "0", "thorvg-main / threads=true / sw=0"),
              ("thorvg-main", "false", "4", "thorvg-main / threads=false / sw=4"),
              ("thorvg-main", "true", "4", "thorvg-main / threads=true / sw=4"),
          ]

          commit_lines = []
          for platform in platforms:
              for subproject, threads, sw, _ in variant_defs:
                  commits_path = root / f"{platform}_{subproject}_{threads}_sw_{sw}_feature_commits.txt"
                  if commits_path.exists():
                      commit_lines = [line for line in commits_path.read_text(encoding="utf-8", errors="replace").splitlines() if line.strip()]
                      if commit_lines:
                          break
              if commit_lines:
                  break

          lines.append("### Added Commits")
          lines.append("")
          if commit_lines:
              lines.append("```text")
              lines.extend(commit_lines)
              lines.append("```")
          else:
              lines.append("No additional commits.")
          lines.append("")

          fps_pattern = re.compile(r"\[\s*\d+\]:\s*([0-9.]+)\s*/\s*([0-9.]+)\s+fps")

          for platform, label in platforms.items():
              cores_path = root / f"{platform}_cores.txt"
              cores = cores_path.read_text(encoding="utf-8", errors="replace").strip() if cores_path.exists() else "n/a"

              lines.append(f"### {label}")
              lines.append("")
              lines.append(f"Available cores: **{cores}**")
              lines.append("")

              lines.extend([
                  "| Variant | FPS Delta | Base Elapsed | Target Elapsed |",
                  "|---|---:|---:|---:|",
              ])

              for subproject, threads, sw, variant_label in variant_defs:
                  status_path = root / f"{platform}_{subproject}_{threads}_sw_{sw}_merge_status.tsv"
                  status = "no-data"
                  if status_path.exists():
                      status_map = {}
                      for line in status_path.read_text(encoding="utf-8", errors="replace").splitlines():
                          if not line.strip():
                              continue
                          key, value = line.split("\t", 1)
                          status_map[key] = value
                      status = status_map.get("status", "unknown")

                  fps_by_state = {}
                  for state in ("base", "merged"):
                      log_path = root / f"{platform}_{subproject}_{threads}_{state}_sw_{sw}.log"
                      if not log_path.exists():
                          continue
                      avg_fps = None
                      for line in reversed(log_path.read_text(encoding="utf-8", errors="replace").splitlines()):
                          match = fps_pattern.search(line)
                          if match:
                              avg_fps = float(match.group(2))
                              break
                      if avg_fps is not None:
                          fps_by_state[state] = avg_fps

                  elapsed_by_state = {}
                  elapsed_metrics_path = root / f"{platform}_{subproject}_{threads}_sw_{sw}_elapsed_metrics.tsv"
                  if elapsed_metrics_path.exists():
                      for line in elapsed_metrics_path.read_text(encoding="utf-8", errors="replace").splitlines():
                          if not line.strip():
                              continue
                          state, elapsed = line.split("\t", 1)
                          elapsed_by_state[state] = elapsed or "n/a"

                  if status != "merged":
                      lines.append(f"| {variant_label} | merge-conflict | {elapsed_by_state.get('base', 'n/a')} | {elapsed_by_state.get('merged', 'n/a')} |")
                      continue

                  base = fps_by_state.get("base")
                  target = fps_by_state.get("merged")
                  if base is None or target is None:
                      lines.append(f"| {variant_label} | n/a | {elapsed_by_state.get('base', 'n/a')} | {elapsed_by_state.get('merged', 'n/a')} |")
                      continue

                  pct = ((target / base) - 1.0) * 100.0
                  pct_sign = "+" if pct > 0 else ""
                  lines.append(f"| {variant_label} | {pct_sign}{pct:.2f}% | {elapsed_by_state.get('base', 'n/a')} | {elapsed_by_state.get('merged', 'n/a')} |")
              lines.append("")

          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
