name: LottieExpressions Compare

on:
  workflow_dispatch:
    inputs:
      branch:
        description: ThorVG branch to merge into main locally
        required: true
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu
            runs_on: ubuntu-latest
          - platform: macos
            runs_on: macos-latest
          - platform: windows-msvc
            runs_on: windows-latest
          - platform: windows-msys2
            runs_on: windows-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set Up Python
        if: matrix.platform == 'windows-msvc'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Prepare vcpkg binary cache
        if: matrix.platform == 'windows-msvc'
        shell: powershell
        run: |
          $binaryCache = Join-Path $env:GITHUB_WORKSPACE '.cache\vcpkg-binary-cache'
          New-Item -ItemType Directory -Force -Path $binaryCache | Out-Null

      - name: Cache vcpkg binary cache
        if: matrix.platform == 'windows-msvc'
        uses: actions/cache@v4
        with:
          path: .cache/vcpkg-binary-cache
          key: windows-msvc-vcpkg-binary-${{ runner.os }}-${{ hashFiles('.github/workflows/lottie-expressions-matrix.yml') }}
          restore-keys: |
            windows-msvc-vcpkg-binary-${{ runner.os }}-

      - name: Set Up MSVC Developer Command Prompt
        if: matrix.platform == 'windows-msvc'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set Up MSYS2
        if: matrix.platform == 'windows-msys2'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            git
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-meson
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-SDL2

      - name: Install Packages (Ubuntu)
        if: matrix.platform == 'ubuntu'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build libsdl2-dev libgl1-mesa-dev

      - name: Install Packages (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          brew update
          brew install meson ninja sdl2 libomp
          echo "PKG_CONFIG_PATH=$(brew --prefix)/lib/pkgconfig:$(brew --prefix sdl2)/lib/pkgconfig:$(brew --prefix libomp)/lib/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}" >> "$GITHUB_ENV"
          echo "CPPFLAGS=-I$(brew --prefix libomp)/include${CPPFLAGS:+ $CPPFLAGS}" >> "$GITHUB_ENV"
          echo "LDFLAGS=-L$(brew --prefix libomp)/lib -Wl,-rpath,$(brew --prefix libomp)/lib${LDFLAGS:+ $LDFLAGS}" >> "$GITHUB_ENV"

      - name: Install Packages (Windows MSVC)
        if: matrix.platform == 'windows-msvc'
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install meson ninja
          choco install pkgconfiglite -y
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP 'vcpkg'
          $binaryCache = Join-Path $env:GITHUB_WORKSPACE '.cache\vcpkg-binary-cache'
          git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
          $env:VCPKG_ROOT = $vcpkgRoot
          $env:VCPKG_DEFAULT_BINARY_CACHE = $binaryCache
          $env:VCPKG_BINARY_SOURCES = "clear;files,$binaryCache,readwrite"
          & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            & "$vcpkgRoot\vcpkg.exe" --vcpkg-root "$vcpkgRoot" install sdl2:x64-windows
            if ($LASTEXITCODE -eq 0) {
              break
            }
            if ($attempt -eq $maxAttempts) {
              exit $LASTEXITCODE
            }
            Start-Sleep -Seconds (15 * $attempt)
          }
          "VCPKG_DEFAULT_BINARY_CACHE=$binaryCache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKG_BINARY_SOURCES=clear;files,$binaryCache,readwrite" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PKG_CONFIG_PATH=$vcpkgRoot\installed\x64-windows\lib\pkgconfig;$vcpkgRoot\installed\x64-windows\share\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CMAKE_PREFIX_PATH=$vcpkgRoot\installed\x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$vcpkgRoot\installed\x64-windows\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Prepare report directory (POSIX)
        if: matrix.platform == 'ubuntu' || matrix.platform == 'macos'
        shell: bash
        run: |
          mkdir -p ci-report

      - name: Prepare report directory (Windows MSVC)
        if: matrix.platform == 'windows-msvc'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path ci-report | Out-Null

      - name: Prepare report directory (Windows MSYS2)
        if: matrix.platform == 'windows-msys2'
        shell: msys2 {0}
        run: |
          mkdir -p ci-report

      - name: Compare LottieExpressions (POSIX)
        if: matrix.platform == 'ubuntu' || matrix.platform == 'macos'
        shell: bash
        run: |
          repo_root="$PWD"
          target_branch="${{ github.event.inputs.branch }}"
          subproject_dir="subprojects/thorvg-main"
          platform="${{ matrix.platform }}"

          collect_perf() {
            state="$1"
            build_dir="build-${state}"
            raw_log="${repo_root}/ci-report/raw_${platform}_${state}_sw_0.tmp"
            final_log="${repo_root}/ci-report/${platform}_${state}_sw_0.log"
            metrics_file="${repo_root}/ci-report/${platform}_${state}_metrics.txt"

            meson setup "$build_dir" \
              -Dbuildtype=release \
              -Doptimization=s \
              -Dthorvg_subproject=thorvg-main \
              -Dthreads=true
            meson compile -C "$build_dir"

            if [ "$platform" = "ubuntu" ]; then
              /usr/bin/time -v -o "$metrics_file" "./${build_dir}/src/LottieExpressions" sw 0 > "$raw_log" 2>&1
              status=$?
              python3 -c "import re, sys, pathlib; state=sys.argv[1]; metrics_path=pathlib.Path(sys.argv[2]); out_path=pathlib.Path(sys.argv[3]); text=metrics_path.read_text(encoding='utf-8', errors='replace'); patterns={'rss_kb': r'Maximum resident set size \\(kbytes\\):\\s*(\\d+)', 'user_sec': r'User time \\(seconds\\):\\s*([0-9.]+)', 'sys_sec': r'System time \\(seconds\\):\\s*([0-9.]+)', 'elapsed': r'Elapsed \\(wall clock\\) time \\(h:mm:ss or m:ss\\):\\s*([0-9:.]+)', 'vol_cs': r'Voluntary context switches:\\s*(\\d+)', 'invol_cs': r'Involuntary context switches:\\s*(\\d+)'}; extract=lambda key: (re.search(patterns[key], text).group(1) if re.search(patterns[key], text) else ''); values=[state, extract('rss_kb'), extract('user_sec'), extract('sys_sec'), extract('elapsed'), extract('vol_cs'), extract('invol_cs')]; out_path.open('a', encoding='utf-8').write('\\t'.join(values)+'\\n')" "$state" "$metrics_file" "${repo_root}/ci-report/${platform}_runtime_metrics.tsv"
            else
              "./${build_dir}/src/LottieExpressions" sw 0 > "$raw_log" 2>&1
              status=$?
            fi

            tail -n 30 "$raw_log" > "$final_log"
            return $status
          }

          printf 'branch\t%s\n' "$target_branch" > "${repo_root}/ci-report/${platform}_merge_status.tsv"
          : > "${repo_root}/ci-report/${platform}_runtime_metrics.tsv"

          pushd "$subproject_dir" > /dev/null
          git fetch origin \
            "refs/heads/main:refs/remotes/origin/main" \
            "refs/heads/${target_branch}:refs/remotes/origin/${target_branch}"
          git log --oneline --no-merges "origin/main..origin/${target_branch}" > "${repo_root}/ci-report/${platform}_feature_commits.txt" || true

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout --detach origin/main
          popd > /dev/null
          collect_perf base

          pushd "$subproject_dir" > /dev/null
          git switch -C ci-merge-check origin/main
          if ! git merge --no-commit --no-ff "origin/${target_branch}"; then
            printf 'status\tmerge-conflict\n' >> "${repo_root}/ci-report/${platform}_merge_status.tsv"
            git merge --abort || true
            popd > /dev/null
            exit 1
          fi
          printf 'status\tmerged\n' >> "${repo_root}/ci-report/${platform}_merge_status.tsv"
          popd > /dev/null

          collect_perf merged

      - name: Compare LottieExpressions (Windows MSVC)
        if: matrix.platform == 'windows-msvc'
        shell: powershell
        run: |
          $repoRoot = $PWD.Path
          $targetBranch = "${{ github.event.inputs.branch }}"
          $subprojectDir = "subprojects/thorvg-main"
          $platform = "${{ matrix.platform }}"

          function Invoke-Perf {
            param([string]$State)

            $buildDir = "build-$State"
            $rawLog = "ci-report/raw_${platform}_${State}_sw_0.tmp"
            $finalLog = "ci-report/${platform}_${State}_sw_0.log"

            meson setup $buildDir "-Dbuildtype=release" "-Doptimization=s" "-Dthorvg_subproject=thorvg-main" "-Dthreads=true"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            meson compile -C $buildDir
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            & ".\$buildDir\src\LottieExpressions.exe" sw 0 *>&1 | Tee-Object -FilePath $rawLog
            $status = $LASTEXITCODE
            Get-Content $rawLog -Tail 30 | Set-Content $finalLog
            if ($status -ne 0) { exit $status }
          }

          "branch`t$targetBranch" | Set-Content "ci-report/${platform}_merge_status.tsv"
          Set-Location $subprojectDir
          git fetch origin "refs/heads/main:refs/remotes/origin/main" "refs/heads/$targetBranch:refs/remotes/origin/$targetBranch"
          git log --oneline --no-merges "origin/main..origin/$targetBranch" | Set-Content "$repoRoot/ci-report/${platform}_feature_commits.txt"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --detach origin/main
          Set-Location $repoRoot
          Invoke-Perf -State base

          Set-Location $subprojectDir
          git checkout -B ci-merge-check origin/main
          git merge --no-commit --no-ff "origin/$targetBranch"
          if ($LASTEXITCODE -ne 0) {
            "status`tmerge-conflict" | Add-Content "$repoRoot/ci-report/${platform}_merge_status.tsv"
            git merge --abort
            exit $LASTEXITCODE
          }
          "status`tmerged" | Add-Content "$repoRoot/ci-report/${platform}_merge_status.tsv"
          Set-Location $repoRoot
          Invoke-Perf -State merged

      - name: Compare LottieExpressions (Windows MSYS2)
        if: matrix.platform == 'windows-msys2'
        shell: msys2 {0}
        run: |
          repo_root="$PWD"
          target_branch="${{ github.event.inputs.branch }}"
          subproject_dir="subprojects/thorvg-main"
          platform="${{ matrix.platform }}"

          collect_perf() {
            state="$1"
            build_dir="build-${state}"
            raw_log="${repo_root}/ci-report/raw_${platform}_${state}_sw_0.tmp"
            final_log="${repo_root}/ci-report/${platform}_${state}_sw_0.log"

            meson setup "$build_dir" \
              -Dbuildtype=release \
              -Doptimization=s \
              -Dthorvg_subproject=thorvg-main \
              -Dthreads=true
            meson compile -C "$build_dir"
            "./${build_dir}/src/LottieExpressions.exe" sw 0 > "$raw_log" 2>&1
            status=$?
            tail -n 30 "$raw_log" > "$final_log"
            return $status
          }

          printf 'branch\t%s\n' "$target_branch" > "${repo_root}/ci-report/${platform}_merge_status.tsv"
          : > "${repo_root}/ci-report/${platform}_runtime_metrics.tsv"

          pushd "$subproject_dir" > /dev/null
          git fetch origin \
            "refs/heads/main:refs/remotes/origin/main" \
            "refs/heads/${target_branch}:refs/remotes/origin/${target_branch}"
          git log --oneline --no-merges "origin/main..origin/${target_branch}" > "${repo_root}/ci-report/${platform}_feature_commits.txt" || true

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout --detach origin/main
          popd > /dev/null
          collect_perf base

          pushd "$subproject_dir" > /dev/null
          git switch -C ci-merge-check origin/main
          if ! git merge --no-commit --no-ff "origin/${target_branch}"; then
            printf 'status\tmerge-conflict\n' >> "${repo_root}/ci-report/${platform}_merge_status.tsv"
            git merge --abort || true
            popd > /dev/null
            exit 1
          fi
          printf 'status\tmerged\n' >> "${repo_root}/ci-report/${platform}_merge_status.tsv"
          popd > /dev/null

          collect_perf merged

      - name: Upload Compare Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lottie-expressions-compare-${{ matrix.platform }}
          path: |
            ci-report/*.log
            ci-report/*.tsv
            ci-report/*.txt
          if-no-files-found: warn

  report:
    name: LottieExpressions Report
    if: ${{ always() }}
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download Compare Artifacts
        uses: actions/download-artifact@v5
        with:
          path: all-report
          pattern: lottie-expressions-compare-*
          merge-multiple: true

      - name: Write Compare Summary
        shell: bash
        env:
          BRANCH_NAME: ${{ github.event.inputs.branch }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          branch_name = os.environ["BRANCH_NAME"]
          root = Path("all-report")

          platforms = {
              "ubuntu": "Ubuntu",
              "macos": "Mac",
              "windows-msvc": "Windows MSVC",
              "windows-msys2": "Windows MSYS2",
          }

          lines = [
              f"## LottieExpressions (main vs {branch_name})",
              "",
          ]

          commit_lines = []
          for platform in platforms:
              commits_path = root / f"{platform}_feature_commits.txt"
              if commits_path.exists():
                  commit_lines = [line for line in commits_path.read_text(encoding="utf-8", errors="replace").splitlines() if line.strip()]
                  break

          lines.append("### Added Commits")
          lines.append("")
          if commit_lines:
              lines.append("```text")
              lines.extend(commit_lines)
              lines.append("```")
          else:
              lines.append("No additional commits.")
          lines.append("")

          fps_pattern = re.compile(r"\[\s*\d+\]:\s*([0-9.]+)\s*/\s*([0-9.]+)\s+fps")

          for platform, label in platforms.items():
              status_path = root / f"{platform}_merge_status.tsv"
              status = "no-data"
              if status_path.exists():
                  status_map = {}
                  for line in status_path.read_text(encoding="utf-8", errors="replace").splitlines():
                      if not line.strip():
                          continue
                      key, value = line.split("\t", 1)
                      status_map[key] = value
                  status = status_map.get("status", "unknown")

              lines.append(f"### {label}")
              lines.append("")
              lines.append(f"- Status: `{status}`")
              lines.append("")

              if status != "merged":
                  lines.append("Comparison was not completed on this platform.")
                  lines.append("")
                  continue

              fps_by_state = {}
              for state in ("base", "merged"):
                  log_path = root / f"{platform}_{state}_sw_0.log"
                  if not log_path.exists():
                      continue
                  avg_fps = None
                  for line in reversed(log_path.read_text(encoding="utf-8", errors="replace").splitlines()):
                      match = fps_pattern.search(line)
                      if match:
                          avg_fps = float(match.group(2))
                          break
                  if avg_fps is not None:
                      fps_by_state[state] = avg_fps

              metrics_by_state = {}
              metrics_path = root / f"{platform}_runtime_metrics.tsv"
              if metrics_path.exists():
                  for line in metrics_path.read_text(encoding="utf-8", errors="replace").splitlines():
                      if not line.strip():
                          continue
                      state, rss_kb, user_sec, sys_sec, elapsed, vol_cs, invol_cs = line.split("\t")
                      metrics_by_state[state] = {
                          "rss_kb": int(rss_kb) if rss_kb else None,
                          "user_sec": user_sec or "n/a",
                          "sys_sec": sys_sec or "n/a",
                          "elapsed": elapsed or "n/a",
                          "vol_cs": int(vol_cs) if vol_cs else None,
                          "invol_cs": int(invol_cs) if invol_cs else None,
                      }

              lines.extend([
                  "| Comparison | FPS Delta | Base Max RSS | Target Max RSS | Memory Delta | Base Elapsed | Target Elapsed | Base User/Sys | Target User/Sys | Base Ctx Switches | Target Ctx Switches |",
                  "|---|---:|---:|---:|---:|---:|---:|---:|---:|---:|---:|",
              ])

              base = fps_by_state.get("base")
              target = fps_by_state.get("merged")
              base_metrics = metrics_by_state.get("base", {})
              target_metrics = metrics_by_state.get("merged", {})

              if base is None or target is None:
                  lines.append(f"| main vs main+{branch_name} | n/a | n/a | n/a | n/a | n/a | n/a | n/a | n/a | n/a | n/a |")
                  lines.append("")
                  continue

              pct = ((target / base) - 1.0) * 100.0
              pct_sign = "+" if pct > 0 else ""

              base_rss = base_metrics.get("rss_kb")
              target_rss = target_metrics.get("rss_kb")
              if base_rss is None or target_rss is None:
                  memory_delta = "n/a"
                  base_rss_text = "n/a"
                  target_rss_text = "n/a"
              else:
                  rss_diff = target_rss - base_rss
                  rss_pct = ((target_rss / base_rss) - 1.0) * 100.0 if base_rss else 0.0
                  rss_pct_sign = "+" if rss_pct > 0 else ""
                  memory_delta = f"{rss_diff:+d} KB ({rss_pct_sign}{rss_pct:.2f}%)"
                  base_rss_text = f"{base_rss} KB"
                  target_rss_text = f"{target_rss} KB"

              base_ctx = "n/a"
              target_ctx = "n/a"
              if base_metrics.get("vol_cs") is not None and base_metrics.get("invol_cs") is not None:
                  base_ctx = f"{base_metrics['vol_cs']}/{base_metrics['invol_cs']}"
              if target_metrics.get("vol_cs") is not None and target_metrics.get("invol_cs") is not None:
                  target_ctx = f"{target_metrics['vol_cs']}/{target_metrics['invol_cs']}"

              lines.append(
                  f"| main vs main+{branch_name} | {pct_sign}{pct:.2f}% | "
                  f"{base_rss_text} | {target_rss_text} | {memory_delta} | "
                  f"{base_metrics.get('elapsed', 'n/a')} | {target_metrics.get('elapsed', 'n/a')} | "
                  f"{base_metrics.get('user_sec', 'n/a')}/{base_metrics.get('sys_sec', 'n/a')} | "
                  f"{target_metrics.get('user_sec', 'n/a')}/{target_metrics.get('sys_sec', 'n/a')} | "
                  f"{base_ctx} | {target_ctx} |"
              )
              lines.append("")

          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
