name: Ubuntu Binary Size
run-name: Ubuntu Binary Size

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ubuntu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Packages
        shell: bash
        run: |
          packages=(meson ninja-build libsdl2-dev libgl1-mesa-dev)
          missing=()
          for pkg in "${packages[@]}"; do
            if ! dpkg-query -W -f='${Status}' "$pkg" 2>/dev/null | grep -q "install ok installed"; then
              missing+=("$pkg")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            sudo apt-get update
            sudo apt-get install -y "${missing[@]}"
          else
            echo "Ubuntu packages already installed."
          fi

      - name: Prepare report directory
        shell: bash
        run: |
          mkdir -p ci-report

      - name: Collect Binary Size Metrics
        shell: bash
        run: |
          repo_root="$PWD"
          compiler_path="$(command -v c++)"
          compiler_version="$(c++ --version | head -n 1)"

          {
            printf 'compiler\t%s\n' "c++"
            printf 'compiler_path\t%s\n' "$compiler_path"
            printf 'compiler_version\t%s\n' "$compiler_version"
          } > "${repo_root}/ci-report/compiler_metadata.tsv"

          collect_size() {
            subproject="$1"
            threads="$2"
            subproject_dir="subprojects/${subproject}"
            build_dir="build-size-${threads}"
            size_out="${repo_root}/ci-report/ubuntu_${subproject}_${threads}.size.txt"

            pushd "$subproject_dir" > /dev/null
            meson setup --wipe "$build_dir" \
              -Dbuildtype=release \
              -Doptimization=s \
              -Dengines=sw \
              -Dloaders=all \
              -Dsavers=all \
              -Dbindings=capi \
              -Dextra=lottie_exp,openmp \
              -Db_sanitize=none \
              -Dthreads="$threads" \
              -Ddefault_library=shared
            meson compile -C "$build_dir"

            lib_path="$build_dir/src/libthorvg-1.so.1.0.0"
            if [ ! -f "$lib_path" ]; then
              echo "Failed to locate shared lib: $lib_path" >&2
              popd > /dev/null
              exit 1
            fi

            strip "$lib_path"
            size "$lib_path" > "$size_out"
            read -r text_size data_size _ < <(awk 'NR==2 {print $1, $2, $3}' "$size_out")
            total_size=$((text_size + data_size))
            popd > /dev/null
            printf '%s\t%s\t%s\t%s\t%s\n' \
              "$subproject" \
              "$threads" \
              "$text_size" \
              "$data_size" \
              "$total_size" >> "${repo_root}/ci-report/ubuntu_binary_sizes.tsv"
          }

          : > "${repo_root}/ci-report/ubuntu_binary_sizes.tsv"
          collect_size thorvg-main false
          collect_size thorvg-main true
          collect_size thorvg-nors false
          collect_size thorvg-nors true

      - name: Upload Binary Size Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ubuntu-binary-size
          path: |
            ci-report/*.size.txt
            ci-report/*.tsv
          if-no-files-found: warn

  report:
    name: Ubuntu Binary Size Report
    if: ${{ always() }}
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download Binary Size Artifacts
        uses: actions/download-artifact@v8
        with:
          path: all-size
          pattern: ubuntu-binary-size
          merge-multiple: false

      - name: Write Binary Size Summary
        shell: bash
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          size_tsv_files = sorted(Path("all-size").glob("*/*.tsv"))
          metadata_path = Path("all-size/ubuntu-binary-size/compiler_metadata.tsv")

          if not size_tsv_files:
              summary_path.write_text("## Ubuntu Binary Size\n\nNo size artifacts were collected.\n", encoding="utf-8")
              raise SystemExit(0)

          compiler_meta = {}
          if metadata_path.exists():
              for line in metadata_path.read_text(encoding="utf-8", errors="replace").splitlines():
                  if not line.strip():
                      continue
                  key, value = line.split("\t", 1)
                  compiler_meta[key] = value

          size_by_key = {}
          for size_tsv in size_tsv_files:
              for line in size_tsv.read_text(encoding="utf-8", errors="replace").splitlines():
                  if not line.strip():
                      continue
                  subproject, thread_flag, text_size, data_size, total_size = line.split("\t")
                  size_by_key[(subproject, thread_flag)] = {
                      "text": int(text_size),
                      "data": int(data_size),
                      "total": int(total_size),
                  }

          def format_size_delta(base_total, target_total):
              diff = target_total - base_total
              pct = ((target_total / base_total) - 1.0) * 100.0
              pct_sign = "+" if pct > 0 else ""
              diff_sign = "+" if diff > 0 else ""
              return f"{diff_sign}{diff} bytes ({pct_sign}{pct:.2f}%)"

          comparisons = [
              ("main thread vs feature thread", ("thorvg-main", "true"), ("thorvg-nors", "true")),
              ("main nonthread vs feature nonthread", ("thorvg-main", "false"), ("thorvg-nors", "false")),
          ]

          lines = [
              "## Ubuntu Binary Size",
              "",
              "- Shared object: `libthorvg-1.so.1.0.0`",
              f"- Compiler: `{compiler_meta.get('compiler', 'n/a')}`",
              f"- Compiler path: `{compiler_meta.get('compiler_path', 'n/a')}`",
              f"- Compiler version: `{compiler_meta.get('compiler_version', 'n/a')}`",
              "",
              "| Comparison | Base TEXT | Base DATA | Base TEXT+DATA | Target TEXT | Target DATA | Target TEXT+DATA | Delta |",
              "|---|---:|---:|---:|---:|---:|---:|---:|",
          ]

          for label, base_key, target_key in comparisons:
              base = size_by_key.get(base_key)
              target = size_by_key.get(target_key)
              if base is None or target is None:
                  lines.append(f"| {label} | n/a | n/a | n/a | n/a | n/a | n/a | n/a |")
              else:
                  lines.append(
                      f"| {label} | {base['text']} | {base['data']} | {base['total']} | "
                      f"{target['text']} | {target['data']} | {target['total']} | "
                      f"{format_size_delta(base['total'], target['total'])} |"
                  )

          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
