name: LottieExpressions Light

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, 'expressions') }}
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu
            runs_on: ubuntu-latest
          - platform: macos
            runs_on: macos-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Packages (Ubuntu)
        if: matrix.platform == 'ubuntu'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build libsdl2-dev libgl1-mesa-dev

      - name: Install Packages (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          brew update
          brew install meson ninja sdl2 libomp
          echo "PKG_CONFIG_PATH=$(brew --prefix)/lib/pkgconfig:$(brew --prefix sdl2)/lib/pkgconfig:$(brew --prefix libomp)/lib/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}" >> "$GITHUB_ENV"
          echo "CPPFLAGS=-I$(brew --prefix libomp)/include${CPPFLAGS:+ $CPPFLAGS}" >> "$GITHUB_ENV"
          echo "LDFLAGS=-L$(brew --prefix libomp)/lib -Wl,-rpath,$(brew --prefix libomp)/lib${LDFLAGS:+ $LDFLAGS}" >> "$GITHUB_ENV"

      - name: Prepare report directory
        shell: bash
        run: |
          mkdir -p ci-report

      - name: Build and Run Variants
        shell: bash
        run: |
          setup_args=(-Dbuildtype=release -Doptimization=s)

          run_case() {
            subproject="$1"
            threads="$2"
            sw="$3"
            build_dir="build-${subproject}-${threads}"
            raw_log="ci-report/raw_${{ matrix.platform }}_${subproject}_${threads}_sw_${sw}.tmp"
            final_log="ci-report/${{ matrix.platform }}_${subproject}_${threads}_sw_${sw}.log"

            meson setup --wipe "$build_dir" "${setup_args[@]}" -Dthorvg_subproject="$subproject" -Dthreads="$threads"
            meson compile -C "$build_dir"
            "./${build_dir}/src/LottieExpressions" sw "$sw" > "$raw_log" 2>&1
            status=$?
            tail -n 30 "$raw_log" > "$final_log"
            return $status
          }

          run_case thorvg-main false 0

          if [ "${{ matrix.platform }}" = "macos" ]; then
            run_case thorvg-nors true 0
          else
            run_case thorvg-nors false 0
            run_case thorvg-nors true 0
          fi

      - name: Upload Lottie logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lottie-light-logs-${{ matrix.platform }}
          path: |
            ci-report/*.log
          if-no-files-found: warn

  report:
    name: LottieExpressions Light Report
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, 'expressions')) }}
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download Lottie log artifacts
        uses: actions/download-artifact@v5
        with:
          path: all-logs
          pattern: lottie-light-logs-*
          merge-multiple: false

      - name: Write Lottie summary
        shell: bash
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          logs = sorted(Path("all-logs").glob("*/*.log"))

          if not logs:
              summary_path.write_text("## LottieExpressions Light Summary\n\nNo log artifacts were collected.\n", encoding="utf-8")
              raise SystemExit(0)

          fps_by_key = {}
          fps_pattern = re.compile(r"\[\s*\d+\]:\s*([0-9.]+)\s*/\s*([0-9.]+)\s+fps")

          for log in logs:
              name = log.name.removesuffix(".log")
              parts = name.split("_")
              if len(parts) != 5:
                  continue
              platform, subproject, thread_flag, engine, sw_value = parts
              if engine != "sw":
                  continue

              lines = log.read_text(encoding="utf-8", errors="replace").splitlines()
              avg_fps = None
              for line in reversed(lines):
                  match = fps_pattern.search(line)
                  if match:
                      avg_fps = float(match.group(2))
                      break

              if avg_fps is None:
                  continue

              fps_by_key[(platform, subproject, thread_flag, sw_value)] = avg_fps

          def format_delta(base, target):
              pct = ((target / base) - 1.0) * 100.0
              sign = "+" if pct > 0 else ""
              return f"{sign}{pct:.2f}%"

          def comparison_line(label, base_key, target_key):
              base = fps_by_key.get(base_key)
              target = fps_by_key.get(target_key)
              if base is None or target is None:
                  return f"- {label} -> n/a"
              if abs(target - base) < 0.005:
                  return f"- {label} -> 0%"
              return f"- {label} -> {format_delta(base, target)}"

          lines = ["## LottieExpressions Light Summary", ""]

          if any(key[0] == "macos" for key in fps_by_key):
              lines.append("### Mac")
              lines.append("")
              lines.append("#### 1. thread option enabled")
              lines.append("")
              lines.append(
                  comparison_line(
                      "feature + 0 threads",
                      ("macos", "thorvg-main", "false", "0"),
                      ("macos", "thorvg-nors", "true", "0"),
                  )
              )
              lines.append("")
              lines.append("---")
              lines.append("")

          if any(key[0] == "ubuntu" for key in fps_by_key):
              lines.append("### Ubuntu")
              lines.append("")
              lines.append("#### 1. thread option enabled")
              lines.append("")
              lines.append(
                  comparison_line(
                      "feature + 0 threads",
                      ("ubuntu", "thorvg-main", "false", "0"),
                      ("ubuntu", "thorvg-nors", "true", "0"),
                  )
              )
              lines.append("")
              lines.append("#### 2. thread option disabled")
              lines.append("")
              lines.append(
                  comparison_line(
                      "feature + 0 threads",
                      ("ubuntu", "thorvg-main", "false", "0"),
                      ("ubuntu", "thorvg-nors", "false", "0"),
                  )
              )

          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
