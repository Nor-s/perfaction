name: LottieExpressions Compare Branches
run-name: Compare (${{ inputs.branch_a }} vs ${{ inputs.branch_b }}) (tick=${{ inputs.tick_count }}, loops=${{ inputs.loop_count }}, threads=${{ inputs.threads }})

on:
  workflow_dispatch:
    inputs:
      branch_a:
        description: Base branch (left side of comparison)
        required: true
        type: string
      branch_b:
        description: Target branch (right side of comparison)
        required: true
        type: string
      tick_count:
        description: Tick count for measured runs
        required: true
        default: '4000'
        type: string
      loop_count:
        description: Number of measured loops (1-10)
        required: true
        default: '3'
        type: string
      threads:
        description: Thread count for LottieExpressions (0=single)
        required: true
        default: '0'
        type: string

permissions:
  contents: read
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu
            runs_on: ubuntu-latest
          - platform: macos
            runs_on: macos-latest
          - platform: windows-msvc
            runs_on: windows-latest
          - platform: windows-msys2
            runs_on: windows-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set Up Python
        if: matrix.platform == 'windows-msvc'
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Prepare vcpkg binary cache
        if: matrix.platform == 'windows-msvc'
        shell: powershell
        run: |
          $binaryCache = Join-Path $env:GITHUB_WORKSPACE '.cache\vcpkg-binary-cache'
          New-Item -ItemType Directory -Force -Path $binaryCache | Out-Null

      - name: Cache vcpkg binary cache
        if: matrix.platform == 'windows-msvc'
        uses: actions/cache@v5
        with:
          path: .cache/vcpkg-binary-cache
          key: windows-msvc-vcpkg-binary-${{ runner.os }}-${{ hashFiles('.github/workflows/lottie-expressions-compare-branches.yml') }}
          restore-keys: |
            windows-msvc-vcpkg-binary-${{ runner.os }}-

      - name: Load MSVC Build Environment
        if: matrix.platform == 'windows-msvc'
        shell: powershell
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          $vsInstallPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsInstallPath) {
            throw 'Visual Studio installation not found.'
          }
          $vsDevCmd = Join-Path $vsInstallPath 'Common7\Tools\VsDevCmd.bat'
          $envDump = cmd /c "`"$vsDevCmd`" -arch=x64 -host_arch=x64 >nul && set"
          foreach ($line in $envDump) {
            if ($line -notmatch '^([^=][^=]*)=(.*)$') {
              continue
            }
            $name = $matches[1]
            $value = $matches[2]
            $delimiter = [guid]::NewGuid().ToString()
            Add-Content $env:GITHUB_ENV "$name<<$delimiter"
            Add-Content $env:GITHUB_ENV $value
            Add-Content $env:GITHUB_ENV $delimiter
          }

      - name: Set Up MSYS2
        if: matrix.platform == 'windows-msys2'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            git
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-meson
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-SDL2

      - name: Install Packages (Ubuntu)
        if: matrix.platform == 'ubuntu'
        shell: bash
        run: |
          packages=(meson ninja-build libsdl2-dev libgl1-mesa-dev)
          missing=()
          for pkg in "${packages[@]}"; do
            if ! dpkg-query -W -f='${Status}' "$pkg" 2>/dev/null | grep -q "install ok installed"; then
              missing+=("$pkg")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            sudo apt-get update
            sudo apt-get install -y "${missing[@]}"
          else
            echo "Ubuntu packages already installed."
          fi

      - name: Install Packages (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          formulae=(meson ninja sdl2 libomp)
          missing=()
          for formula in "${formulae[@]}"; do
            if ! brew list --formula "$formula" >/dev/null 2>&1; then
              missing+=("$formula")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            brew update
            brew install "${missing[@]}"
          else
            echo "Homebrew packages already installed."
          fi
          echo "PKG_CONFIG_PATH=$(brew --prefix)/lib/pkgconfig:$(brew --prefix sdl2)/lib/pkgconfig:$(brew --prefix libomp)/lib/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}" >> "$GITHUB_ENV"
          echo "CPPFLAGS=-I$(brew --prefix libomp)/include${CPPFLAGS:+ $CPPFLAGS}" >> "$GITHUB_ENV"
          echo "LDFLAGS=-L$(brew --prefix libomp)/lib -Wl,-rpath,$(brew --prefix libomp)/lib${LDFLAGS:+ $LDFLAGS}" >> "$GITHUB_ENV"

      - name: Install Packages (Windows MSVC)
        if: matrix.platform == 'windows-msvc'
        shell: powershell
        run: |
          $needPipPackages = -not (Get-Command meson -ErrorAction SilentlyContinue) -or -not (Get-Command ninja -ErrorAction SilentlyContinue)
          if ($needPipPackages) {
            python -m pip install --upgrade pip
          }
          if (-not (Get-Command meson -ErrorAction SilentlyContinue)) {
            python -m pip install meson
          } else {
            Write-Host "meson is already installed."
          }
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            python -m pip install ninja
          } else {
            Write-Host "ninja is already installed."
          }
          if (-not (Get-Command pkg-config -ErrorAction SilentlyContinue)) {
            choco install pkgconfiglite -y
          } else {
            Write-Host "pkg-config is already installed."
          }
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP 'vcpkg'
          $binaryCache = Join-Path $env:GITHUB_WORKSPACE '.cache\vcpkg-binary-cache'
          git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
          $env:VCPKG_ROOT = $vcpkgRoot
          $env:VCPKG_DEFAULT_BINARY_CACHE = $binaryCache
          $env:VCPKG_BINARY_SOURCES = "clear;files,$binaryCache,readwrite"
          & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
          $sdl2Pc = Join-Path $vcpkgRoot 'installed\x64-windows\lib\pkgconfig\sdl2.pc'
          if (-not (Test-Path $sdl2Pc)) {
            $maxAttempts = 3
            for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
              & "$vcpkgRoot\vcpkg.exe" --vcpkg-root "$vcpkgRoot" install sdl2:x64-windows
              if ($LASTEXITCODE -eq 0) {
                break
              }
              if ($attempt -eq $maxAttempts) {
                exit $LASTEXITCODE
              }
              Start-Sleep -Seconds (15 * $attempt)
            }
          } else {
            Write-Host "SDL2 is already installed in vcpkg."
          }
          "VCPKG_DEFAULT_BINARY_CACHE=$binaryCache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKG_BINARY_SOURCES=clear;files,$binaryCache,readwrite" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PKG_CONFIG_PATH=$vcpkgRoot\installed\x64-windows\lib\pkgconfig;$vcpkgRoot\installed\x64-windows\share\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CMAKE_PREFIX_PATH=$vcpkgRoot\installed\x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$vcpkgRoot\installed\x64-windows\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Prepare report directory (POSIX)
        if: matrix.platform == 'ubuntu' || matrix.platform == 'macos'
        shell: bash
        run: |
          mkdir -p ci-report

      - name: Prepare report directory (Windows MSVC)
        if: matrix.platform == 'windows-msvc'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path ci-report | Out-Null

      - name: Prepare report directory (Windows MSYS2)
        if: matrix.platform == 'windows-msys2'
        shell: msys2 {0}
        run: |
          mkdir -p ci-report

      - name: Collect Metadata (POSIX)
        if: matrix.platform == 'ubuntu' || matrix.platform == 'macos'
        shell: bash
        run: |
          os_line="$(uname -srvmo)"
          compiler_line="$(c++ --version | head -n 1)"
          {
            printf 'runner\t%s\n' "${{ matrix.runs_on }}"
            printf 'os\t%s\n' "$os_line"
            printf 'compiler\t%s\n' "$compiler_line"
          } > "ci-report/${{ matrix.platform }}_metadata.tsv"

      - name: Collect Metadata (Windows MSVC)
        if: matrix.platform == 'windows-msvc'
        shell: powershell
        run: |
          $compilerLine = ((cmd /c "cl 2>&1") | Select-Object -First 1).ToString().Trim()
          $osLine = [System.Environment]::OSVersion.VersionString
          @(
            "runner`t${{ matrix.runs_on }}"
            "os`t$osLine"
            "compiler`t$compilerLine"
          ) | Set-Content "ci-report/${{ matrix.platform }}_metadata.tsv"

      - name: Collect Metadata (Windows MSYS2)
        if: matrix.platform == 'windows-msys2'
        shell: msys2 {0}
        run: |
          os_line="$(uname -srvmo)"
          compiler_line="$(g++ --version | head -n 1)"
          {
            printf 'runner\t%s\n' "${{ matrix.runs_on }}"
            printf 'os\t%s\n' "$os_line"
            printf 'compiler\t%s\n' "$compiler_line"
          } > "ci-report/${{ matrix.platform }}_metadata.tsv"

      - name: Compare LottieExpressions (POSIX)
        if: matrix.platform == 'ubuntu' || matrix.platform == 'macos'
        shell: bash
        run: |
          repo_root="$PWD"
          branch_a="${{ github.event.inputs.branch_a }}"
          branch_b="${{ github.event.inputs.branch_b }}"
          subproject_dir="subprojects/thorvg-main"
          platform="${{ matrix.platform }}"
          tick_count="${{ github.event.inputs.tick_count }}"
          loop_count="${{ github.event.inputs.loop_count }}"
          thread_count="${{ github.event.inputs.threads }}"

          if ! [[ "$loop_count" =~ ^[0-9]+$ ]] || [ "$loop_count" -lt 1 ] || [ "$loop_count" -gt 10 ]; then
            echo "loop_count must be an integer between 1 and 10" >&2
            exit 1
          fi

          parse_fps() {
            log_path="$1"
            sed -En 's/.*: *[0-9.]+ \/ ([0-9.]+) fps/\1/p' "$log_path" | tail -n 1
          }

          build_state() {
            state="$1"
            build_dir="build-${state}"
            meson setup --wipe "$build_dir" \
              -Dbuildtype=release \
              -Doptimization=s \
              -Dthorvg_subproject=thorvg-main \
              -Dthreads=true
            meson compile -C "$build_dir"
          }

          run_once() {
            state="$1"
            iteration="$2"
            run_type="$3"
            ticks="$4"
            thread_arg="$5"
            build_dir="build-${state}"
            raw_log="${repo_root}/ci-report/raw_${platform}_${state}_${run_type}_${iteration}.tmp"
            final_log="${repo_root}/ci-report/${platform}_${state}_${run_type}_${iteration}.log"
            timing_file="${repo_root}/ci-report/${platform}_${state}_${run_type}_${iteration}.time"

            /usr/bin/time -p -o "$timing_file" "./${build_dir}/src/LottieExpressions" sw "$thread_arg" "$ticks" > "$raw_log" 2>&1
            status=$?
            tail -n 30 "$raw_log" > "$final_log"
            [ "$status" -eq 0 ] || return "$status"

            if [ "$run_type" = "measure" ]; then
              fps="$(parse_fps "$raw_log")"
              elapsed="$(awk '/^real / {print $2}' "$timing_file" | head -n 1)"
              printf '%s\t%s\t%s\t%s\n' "$state" "$iteration" "$fps" "${elapsed:-0}" >> "${repo_root}/ci-report/${platform}_measurements.tsv"
            fi
          }

          printf 'branch_a\t%s\n' "$branch_a" > "${repo_root}/ci-report/${platform}_merge_status.tsv"
          printf 'branch_b\t%s\n' "$branch_b" >> "${repo_root}/ci-report/${platform}_merge_status.tsv"
          : > "${repo_root}/ci-report/${platform}_measurements.tsv"
          : > "${repo_root}/ci-report/${platform}_branch_a_commits.txt"
          : > "${repo_root}/ci-report/${platform}_branch_b_commits.txt"

          pushd "$subproject_dir" > /dev/null
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Fetch both branches
          git fetch origin "+refs/heads/${branch_a}:refs/remotes/origin/${branch_a}" "+refs/heads/${branch_b}:refs/remotes/origin/${branch_b}"
          commit_a="$(git rev-parse "origin/${branch_a}")"
          commit_b="$(git rev-parse "origin/${branch_b}")"

          # Find common ancestor and collect commits
          merge_base="$(git merge-base "$commit_a" "$commit_b" 2>/dev/null || echo "")"
          if [ -n "$merge_base" ]; then
            git log --oneline --no-merges "${merge_base}..${commit_a}" > "${repo_root}/ci-report/${platform}_branch_a_commits.txt" || true
            git log --oneline --no-merges "${merge_base}..${commit_b}" > "${repo_root}/ci-report/${platform}_branch_b_commits.txt" || true
          fi

          # Build branch_a
          git checkout --detach "$commit_a"
          popd > /dev/null
          printf 'status\tmerged\n' >> "${repo_root}/ci-report/${platform}_merge_status.tsv"
          build_state branch_a

          # Build branch_b
          pushd "$subproject_dir" > /dev/null
          git checkout --detach "$commit_b"
          popd > /dev/null
          build_state branch_b

          # Warmup
          run_once branch_a 0 warmup 1000 0
          run_once branch_b 0 warmup 1000 "$thread_count"

          # Measured runs
          for iteration in $(seq 1 "$loop_count"); do
            run_once branch_a "$iteration" measure "$tick_count" 0
            run_once branch_b "$iteration" measure "$tick_count" "$thread_count"
          done

      - name: Compare LottieExpressions (Windows MSVC)
        if: matrix.platform == 'windows-msvc'
        shell: powershell
        run: |
          $repoRoot = $PWD.Path
          $branchA = "${{ github.event.inputs.branch_a }}"
          $branchB = "${{ github.event.inputs.branch_b }}"
          $subprojectDir = "subprojects/thorvg-main"
          $platform = "${{ matrix.platform }}"
          $tickCount = [int]"${{ github.event.inputs.tick_count }}"
          $loopCount = [int]"${{ github.event.inputs.loop_count }}"
          $threadCount = "${{ github.event.inputs.threads }}"

          if ($loopCount -lt 1 -or $loopCount -gt 10) {
            throw "loop_count must be between 1 and 10"
          }

          function Build-State {
            param([string]$State)
            $buildDir = "build-$State"
            meson setup --wipe $buildDir "-Dbuildtype=release" "-Doptimization=s" "-Dthorvg_subproject=thorvg-main" "-Dthreads=true"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            meson compile -C $buildDir
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

          function Run-Once {
            param(
              [string]$State,
              [int]$Iteration,
              [string]$RunType,
              [int]$Ticks,
              [string]$ThreadArg
            )

            $buildDir = "build-$State"
            $rawLog = "ci-report/raw_${platform}_${State}_${RunType}_${Iteration}.tmp"
            $finalLog = "ci-report/${platform}_${State}_${RunType}_${Iteration}.log"

            $stopwatch = [System.Diagnostics.Stopwatch]::StartNew()
            & ".\$buildDir\src\LottieExpressions.exe" sw "$ThreadArg" "$Ticks" *>&1 | Tee-Object -FilePath $rawLog
            $stopwatch.Stop()
            $status = $LASTEXITCODE
            Get-Content $rawLog -Tail 30 | Set-Content $finalLog
            if ($status -ne 0) { exit $status }

            if ($RunType -eq "measure") {
              $fps = $null
              $lines = Get-Content $rawLog
              [array]::Reverse($lines)
              foreach ($line in $lines) {
                if ($line -match ':\s*[0-9.]+\s*/\s*([0-9.]+)\s+fps') {
                  $fps = $matches[1]
                  break
                }
              }
              if (-not $fps) { throw "Failed to parse fps from $rawLog" }
              $elapsed = [string]::Format([System.Globalization.CultureInfo]::InvariantCulture, "{0:F6}", $stopwatch.Elapsed.TotalSeconds)
              "$State`t$Iteration`t$fps`t$elapsed" | Add-Content "ci-report/${platform}_measurements.tsv"
            }
          }

          "branch_a`t$branchA" | Set-Content "ci-report/${platform}_merge_status.tsv"
          "branch_b`t$branchB" | Add-Content "ci-report/${platform}_merge_status.tsv"
          "" | Set-Content "ci-report/${platform}_measurements.tsv"
          "" | Set-Content "ci-report/${platform}_branch_a_commits.txt"
          "" | Set-Content "ci-report/${platform}_branch_b_commits.txt"

          Set-Location $subprojectDir
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin "+refs/heads/${branchA}:refs/remotes/origin/${branchA}" "+refs/heads/${branchB}:refs/remotes/origin/${branchB}"
          $commitA = (git rev-parse "origin/${branchA}").Trim()
          $commitB = (git rev-parse "origin/${branchB}").Trim()

          $mergeBase = git merge-base $commitA $commitB 2>$null
          if ($mergeBase) {
            git log --oneline --no-merges "$mergeBase..$commitA" | Set-Content "$repoRoot/ci-report/${platform}_branch_a_commits.txt"
            git log --oneline --no-merges "$mergeBase..$commitB" | Set-Content "$repoRoot/ci-report/${platform}_branch_b_commits.txt"
          }

          # Build branch_a
          git checkout --detach $commitA
          Set-Location $repoRoot
          "status`tmerged" | Add-Content "ci-report/${platform}_merge_status.tsv"
          Build-State -State branch_a

          # Build branch_b
          Set-Location $subprojectDir
          git checkout --detach $commitB
          Set-Location $repoRoot
          Build-State -State branch_b

          # Warmup
          Run-Once -State branch_a -Iteration 0 -RunType warmup -Ticks 1000 -ThreadArg "0"
          Run-Once -State branch_b -Iteration 0 -RunType warmup -Ticks 1000 -ThreadArg "$threadCount"

          # Measured runs
          for ($iteration = 1; $iteration -le $loopCount; $iteration++) {
            Run-Once -State branch_a -Iteration $iteration -RunType measure -Ticks $tickCount -ThreadArg "0"
            Run-Once -State branch_b -Iteration $iteration -RunType measure -Ticks $tickCount -ThreadArg "$threadCount"
          }

      - name: Compare LottieExpressions (Windows MSYS2)
        if: matrix.platform == 'windows-msys2'
        shell: msys2 {0}
        run: |
          repo_root="$PWD"
          branch_a="${{ github.event.inputs.branch_a }}"
          branch_b="${{ github.event.inputs.branch_b }}"
          subproject_dir="subprojects/thorvg-main"
          platform="${{ matrix.platform }}"
          tick_count="${{ github.event.inputs.tick_count }}"
          loop_count="${{ github.event.inputs.loop_count }}"
          thread_count="${{ github.event.inputs.threads }}"

          if ! [[ "$loop_count" =~ ^[0-9]+$ ]] || [ "$loop_count" -lt 1 ] || [ "$loop_count" -gt 10 ]; then
            echo "loop_count must be an integer between 1 and 10" >&2
            exit 1
          fi

          parse_fps() {
            log_path="$1"
            sed -En 's/.*: *[0-9.]+ \/ ([0-9.]+) fps/\1/p' "$log_path" | tail -n 1
          }

          build_state() {
            state="$1"
            build_dir="build-${state}"
            meson setup --wipe "$build_dir" \
              -Dbuildtype=release \
              -Doptimization=s \
              -Dthorvg_subproject=thorvg-main \
              -Dthreads=true
            meson compile -C "$build_dir"
          }

          run_once() {
            state="$1"
            iteration="$2"
            run_type="$3"
            ticks="$4"
            thread_arg="$5"
            build_dir="build-${state}"
            raw_log="${repo_root}/ci-report/raw_${platform}_${state}_${run_type}_${iteration}.tmp"
            final_log="${repo_root}/ci-report/${platform}_${state}_${run_type}_${iteration}.log"

            start_ns="$(date +%s%N)"
            "./${build_dir}/src/LottieExpressions.exe" sw "$thread_arg" "$ticks" > "$raw_log" 2>&1
            status=$?
            end_ns="$(date +%s%N)"
            tail -n 30 "$raw_log" > "$final_log"
            [ "$status" -eq 0 ] || return "$status"

            if [ "$run_type" = "measure" ]; then
              fps="$(parse_fps "$raw_log")"
              elapsed="$(awk -v start="$start_ns" -v end="$end_ns" 'BEGIN { printf "%.6f", (end - start) / 1000000000 }')"
              printf '%s\t%s\t%s\t%s\n' "$state" "$iteration" "$fps" "$elapsed" >> "${repo_root}/ci-report/${platform}_measurements.tsv"
            fi
          }

          printf 'branch_a\t%s\n' "$branch_a" > "${repo_root}/ci-report/${platform}_merge_status.tsv"
          printf 'branch_b\t%s\n' "$branch_b" >> "${repo_root}/ci-report/${platform}_merge_status.tsv"
          : > "${repo_root}/ci-report/${platform}_measurements.tsv"
          : > "${repo_root}/ci-report/${platform}_branch_a_commits.txt"
          : > "${repo_root}/ci-report/${platform}_branch_b_commits.txt"

          pushd "$subproject_dir" > /dev/null
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin "+refs/heads/${branch_a}:refs/remotes/origin/${branch_a}" "+refs/heads/${branch_b}:refs/remotes/origin/${branch_b}"
          commit_a="$(git rev-parse "origin/${branch_a}")"
          commit_b="$(git rev-parse "origin/${branch_b}")"

          merge_base="$(git merge-base "$commit_a" "$commit_b" 2>/dev/null || echo "")"
          if [ -n "$merge_base" ]; then
            git log --oneline --no-merges "${merge_base}..${commit_a}" > "${repo_root}/ci-report/${platform}_branch_a_commits.txt" || true
            git log --oneline --no-merges "${merge_base}..${commit_b}" > "${repo_root}/ci-report/${platform}_branch_b_commits.txt" || true
          fi

          # Build branch_a
          git checkout --detach "$commit_a"
          popd > /dev/null
          printf 'status\tmerged\n' >> "${repo_root}/ci-report/${platform}_merge_status.tsv"
          build_state branch_a

          # Build branch_b
          pushd "$subproject_dir" > /dev/null
          git checkout --detach "$commit_b"
          popd > /dev/null
          build_state branch_b

          # Warmup
          run_once branch_a 0 warmup 1000 0
          run_once branch_b 0 warmup 1000 "$thread_count"

          # Measured runs
          for iteration in $(seq 1 "$loop_count"); do
            run_once branch_a "$iteration" measure "$tick_count" 0
            run_once branch_b "$iteration" measure "$tick_count" "$thread_count"
          done

      - name: Upload Compare Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lottie-expressions-compare-branches-${{ matrix.platform }}
          path: |
            ci-report/*.log
            ci-report/*.tsv
            ci-report/*.txt
            ci-report/*.time
          if-no-files-found: warn

  report:
    name: LottieExpressions Branches Report
    if: ${{ always() }}
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download Compare Artifacts
        uses: actions/download-artifact@v8
        with:
          path: all-report
          pattern: lottie-expressions-compare-branches-*
          merge-multiple: true

      - name: Write Compare Summary
        shell: bash
        env:
          BRANCH_A: ${{ github.event.inputs.branch_a }}
          BRANCH_B: ${{ github.event.inputs.branch_b }}
          TICK_COUNT: ${{ github.event.inputs.tick_count }}
          LOOP_COUNT: ${{ github.event.inputs.loop_count }}
          THREADS: ${{ github.event.inputs.threads }}
        run: |
          python - <<'PY'
          import os
          import statistics
          from pathlib import Path

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          branch_a = os.environ["BRANCH_A"]
          branch_b = os.environ["BRANCH_B"]
          tick_count = os.environ["TICK_COUNT"]
          loop_count = os.environ["LOOP_COUNT"]
          threads = os.environ["THREADS"]
          root = Path("all-report")

          platforms = {
              "ubuntu": "Ubuntu",
              "macos": "Mac",
              "windows-msvc": "Windows MSVC",
              "windows-msys2": "Windows MSYS2",
          }

          lines = [
              f"## LottieExpressions ({branch_a} vs {branch_b}) (tickCnt={tick_count}, threads={threads})",
              "",
              f"- Average of `{loop_count}` measured runs after `1` warmup run (`1000` ticks)",
              "",
          ]

          # Collect commits from first available platform
          for suffix, label in [("branch_a", branch_a), ("branch_b", branch_b)]:
              commit_lines = []
              for platform in platforms:
                  commits_path = root / f"{platform}_{suffix}_commits.txt"
                  if commits_path.exists():
                      commit_lines = [line for line in commits_path.read_text(encoding="utf-8", errors="replace").splitlines() if line.strip()]
                      break

              lines.append(f"### Commits on `{label}`")
              lines.append("")
              if commit_lines:
                  lines.append("```text")
                  lines.extend(commit_lines)
                  lines.append("```")
              else:
                  lines.append("No diverging commits (or same as common ancestor).")
              lines.append("")

          for platform, label in platforms.items():
              status_path = root / f"{platform}_merge_status.tsv"
              status = "no-data"
              if status_path.exists():
                  for line in status_path.read_text(encoding="utf-8", errors="replace").splitlines():
                      if not line.strip():
                          continue
                      key, value = line.split("\t", 1)
                      if key == "status":
                          status = value
                          break

              lines.append(f"### {label}")
              lines.append("")

              metadata = {}
              metadata_path = root / f"{platform}_metadata.tsv"
              if metadata_path.exists():
                  for line in metadata_path.read_text(encoding="utf-8", errors="replace").splitlines():
                      if not line.strip():
                          continue
                      key, value = line.split("\t", 1)
                      metadata[key] = value

              if metadata:
                  lines.append(f"- Runner: `{metadata.get('runner', 'n/a')}`")
                  lines.append(f"- OS: `{metadata.get('os', 'n/a')}`")
                  lines.append(f"- Compiler: `{metadata.get('compiler', 'n/a')}`")
                  lines.append("")

              if status != "merged":
                  lines.append("Comparison was not completed on this platform.")
                  lines.append("")
                  continue

              measurements_path = root / f"{platform}_measurements.tsv"
              if not measurements_path.exists():
                  lines.append("No measurement data was collected.")
                  lines.append("")
                  continue

              values = {"branch_a": {"fps": [], "elapsed": []}, "branch_b": {"fps": [], "elapsed": []}}
              for line in measurements_path.read_text(encoding="utf-8", errors="replace").splitlines():
                  if not line.strip():
                      continue
                  state, iteration, fps_value, elapsed_value = line.split("\t")
                  values.setdefault(state, {"fps": [], "elapsed": []})
                  values[state]["fps"].append(float(fps_value))
                  values[state]["elapsed"].append(float(elapsed_value))

              a_fps = values.get("branch_a", {}).get("fps", [])
              b_fps = values.get("branch_b", {}).get("fps", [])
              a_elapsed = values.get("branch_a", {}).get("elapsed", [])
              b_elapsed = values.get("branch_b", {}).get("elapsed", [])

              lines.extend([
                  f"| Comparison | Avg FPS Delta | Median FPS Delta | Min FPS Delta | Max FPS Delta | {branch_a} Stddev | {branch_b} Stddev | {branch_a} Elapsed | {branch_b} Elapsed |",
                  "|---|---:|---:|---:|---:|---:|---:|---:|---:|",
              ])

              if not a_fps or not b_fps or not a_elapsed or not b_elapsed:
                  lines.append(f"| {branch_a} vs {branch_b} | n/a | n/a | n/a | n/a | n/a | n/a | n/a | n/a |")
                  lines.append("")
                  continue

              avg_a_fps = sum(a_fps) / len(a_fps)
              avg_b_fps = sum(b_fps) / len(b_fps)
              median_a_fps = statistics.median(a_fps)
              median_b_fps = statistics.median(b_fps)
              min_a_fps = min(a_fps)
              min_b_fps = min(b_fps)
              max_a_fps = max(a_fps)
              max_b_fps = max(b_fps)
              stddev_a_fps = statistics.stdev(a_fps) if len(a_fps) > 1 else 0.0
              stddev_b_fps = statistics.stdev(b_fps) if len(b_fps) > 1 else 0.0
              avg_a_elapsed = sum(a_elapsed) / len(a_elapsed)
              avg_b_elapsed = sum(b_elapsed) / len(b_elapsed)

              def delta_pct(base_value, target_value):
                  pct = ((target_value / base_value) - 1.0) * 100.0 if base_value else 0.0
                  sign = "+" if pct > 0 else ""
                  return f"{sign}{pct:.2f}%"

              lines.append(
                  f"| {branch_a} vs {branch_b} | "
                  f"{delta_pct(avg_a_fps, avg_b_fps)} | "
                  f"{delta_pct(median_a_fps, median_b_fps)} | "
                  f"{delta_pct(min_a_fps, min_b_fps)} | "
                  f"{delta_pct(max_a_fps, max_b_fps)} | "
                  f"{stddev_a_fps:.2f} fps | "
                  f"{stddev_b_fps:.2f} fps | "
                  f"{avg_a_elapsed:.2f}s | {avg_b_elapsed:.2f}s |"
              )
              lines.append("")

          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
